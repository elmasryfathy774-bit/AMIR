<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AChat | إضافة حالة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
    --danger:#FF5D75;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--void);
    overflow:hidden;
  }

  .topbar{
    background:rgba(14,21,38,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft);
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    flex-shrink:0;
    z-index:10;
  }
  .back-btn{
    width:34px; height:34px;
    border-radius:9px;
    background:var(--surface-2);
    border:1px solid var(--border-soft);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none;
    font-size:18px;
    flex-shrink:0;
  }
  .topbar h1{ font-size:16px; font-weight:800; }

  .upload-stage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px 24px;
    text-align:center;
    gap:22px;
    overflow-y:auto;
  }

  .upload-options{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
    max-width:320px;
  }
  .upload-option{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:16px;
    padding:18px 18px;
    cursor:pointer;
    text-align:right;
  }
  .upload-option:active{ background:var(--surface-2); }
  .upload-option .icon{
    width:46px; height:46px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
    flex-shrink:0;
  }
  .upload-option .label{ font-size:15px; font-weight:700; }
  .upload-option .hint{ font-size:12px; color:var(--muted); margin-top:2px; }

  .preview-stage{
    display:none;
    flex:1;
    flex-direction:column;
    position:relative;
    background:#000;
    overflow:hidden;
  }
  .preview-stage.show{ display:flex; }

  /* شريط أعلى مع زر الإرغاء + الإرسال */
  .preview-topbar{
    position:absolute;
    top:0; left:0; right:0;
    z-index:10;
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(to bottom, rgba(7,11,20,.85) 0%, transparent 100%);
  }
  .preview-topbar-title{
    flex:1;
    font-size:15px; font-weight:700;
    color:#fff;
    text-align:center;
  }
  .preview-cancel{
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.2);
    color:#fff;
    font-size:17px;
    cursor:pointer;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .preview-send{
    width:44px; height:44px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    border:none;
    color:#06121C;
    font-size:19px;
    cursor:pointer;
    flex-shrink:0;
    box-shadow:0 6px 16px -4px rgba(47,224,255,.6);
    display:flex; align-items:center; justify-content:center;
  }
  .preview-send:disabled{ opacity:.5; cursor:not-allowed; }

  .preview-media{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .preview-media img, .preview-media video{
    width:100%;
    height:100%;
    object-fit:contain;
  }

  /* Caption في الأسفل فقط لو مكانه */
  .preview-bottom{
    position:absolute;
    bottom:0; left:0; right:0;
    padding:10px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(7,11,20,.85) 0%, transparent 100%);
    z-index:10;
  }
  .preview-caption{
    width:100%;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    border-radius:22px;
    padding:10px 16px;
    color:#fff;
    font-family:inherit;
    font-size:14px;
    outline:none;
  }

  .upload-status{
    position:absolute;
    inset:0;
    background:rgba(7,11,20,.88);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    z-index:20;
  }
  .upload-status.show{ display:flex; }
  .spinner{
    width:38px; height:38px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.18);
    border-top-color:var(--cyan);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .upload-status p{ font-size:13.5px; color:var(--muted); }

  .error-text{
    color:var(--danger);
    font-size:13px;
    margin-top:4px;
    display:none;
  }
  .error-text.show{ display:block; }

  input[type="file"]{ display:none; }
</style>
</head>
<body>

  <div class="topbar">
    <a href="chat.html" class="back-btn">→</a>
    <h1>إضافة حالة</h1>
  </div>

  <div class="upload-stage" id="uploadStage">
    <div class="upload-options">
      <label class="upload-option" for="imageInput">
        <div class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2.5"/>
            <circle cx="8.5" cy="8.5" r="1.8"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <div>
          <div class="label">صورة</div>
          <div class="hint">من معرض الصور بتاعك</div>
        </div>
      </label>
      <label class="upload-option" for="videoInput">
        <div class="icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="6" width="14" height="12" rx="2.5"/>
            <path d="M21.5 8.5l-5 3.5 5 3.5v-7z"/>
          </svg>
        </div>
        <div>
          <div class="label">فيديو قصير</div>
          <div class="hint">حد أقصى 30 ثانية</div>
        </div>
      </label>
    </div>
    <div class="error-text" id="errorText"></div>
  </div>

  <input type="file" id="imageInput" accept="image/*">
  <input type="file" id="videoInput" accept="video/*">

  <div class="preview-stage" id="previewStage">
    <!-- شريط علوي: إلغاء + عنوان + إرسال -->
    <div class="preview-topbar">
      <button type="button" class="preview-cancel" id="cancelBtn">✕</button>
      <div class="preview-topbar-title">معاينة الحالة</div>
      <button type="button" class="preview-send" id="sendStatusBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <!-- الميديا تملأ الشاشة -->
    <div class="preview-media" id="previewMedia"></div>

    <!-- كابشن في الأسفل -->
    <div class="preview-bottom">
      <input type="text" class="preview-caption" id="captionInput" placeholder="أكتبي تعليقاً (اختياري)...">
    </div>

    <div class="upload-status" id="uploadStatusOverlay">
      <div class="spinner"></div>
      <p id="uploadStatusText">جاري التجهيز...</p>
    </div>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { collection, addDoc, doc, getDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const MAX_VIDEO_SECONDS = 30; // حد أقصى 30 ثانية عشان يدخل في Firestore
  const MAX_MEDIA_BYTES = 800000; // 800KB هامش أمان كافي

  const previewStage = document.getElementById('previewStage');
  const previewMedia = document.getElementById('previewMedia');
  const imageInput = document.getElementById('imageInput');
  const videoInput = document.getElementById('videoInput');
  const cancelBtn = document.getElementById('cancelBtn');
  const sendStatusBtn = document.getElementById('sendStatusBtn');
  const errorText = document.getElementById('errorText');
  const uploadStatusOverlay = document.getElementById('uploadStatusOverlay');
  const uploadStatusText = document.getElementById('uploadStatusText');

  let currentUser = null;
  let pendingMediaType = null;
  let pendingDataUrl = null;

  onAuthStateChanged(auth, (user) => {
    if(!user){ window.location.href = 'index.html'; return; }
    currentUser = user;
  });

  function showError(msg){
    errorText.textContent = msg;
    errorText.classList.add('show');
    setTimeout(() => errorText.classList.remove('show'), 4000);
  }

  imageInput.addEventListener('change', async () => {
    const file = imageInput.files[0];
    imageInput.value = '';
    if(!file) return;

    try{
      const dataUrl = await compressImage(file, 1080, 0.78);
      if(estimateBase64Bytes(dataUrl) > MAX_MEDIA_BYTES){
        const dataUrl2 = await compressImage(file, 780, 0.6);
        if(estimateBase64Bytes(dataUrl2) > MAX_MEDIA_BYTES){
          showError('الصورة كبيرة جدًا حتى بعد الضغط، جربي صورة تانية');
          return;
        }
        pendingDataUrl = dataUrl2;
      } else {
        pendingDataUrl = dataUrl;
      }
      pendingMediaType = 'image';
      showPreview();
    } catch(e){
      showError('تعذر تجهيز الصورة: ' + e.message);
    }
  });

  function compressImage(file, maxDimension, quality){
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('فشل قراءة الملف'));
      reader.onload = () => {
        img.onload = () => {
          let { width, height } = img;
          if(width > height && width > maxDimension){
            height = Math.round(height * (maxDimension / width));
            width = maxDimension;
          } else if(height > maxDimension){
            width = Math.round(width * (maxDimension / height));
            height = maxDimension;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('فشل تحميل الصورة'));
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  videoInput.addEventListener('change', async () => {
    const file = videoInput.files[0];
    videoInput.value = '';
    if(!file) return;

    try{
      uploadStatusText.textContent = 'جاري تجهيز الفيديو...';
      uploadStatusOverlay.classList.add('show');

      const result = await processVideo(file);
      uploadStatusOverlay.classList.remove('show');

      if(!result){
        showError('تعذر تجهيز الفيديو');
        return;
      }
      if(estimateBase64Bytes(result) > MAX_MEDIA_BYTES){
        showError('الفيديو كبير جدًا حتى بعد الضغط، جربي فيديو أقصر أو بجودة أقل');
        return;
      }

      pendingDataUrl = result;
      pendingMediaType = 'video';
      showPreview();
    } catch(e){
      uploadStatusOverlay.classList.remove('show');
      showError('تعذر تجهيز الفيديو: ' + e.message);
    }
  });

  function processVideo(file){
    return new Promise((resolve, reject) => {
      const videoEl = document.createElement('video');
      videoEl.muted = false;
      videoEl.playsInline = true;
      videoEl.setAttribute('playsinline', '');
      // لازم العنصر يكون موجود فعليًا جوه الصفحة (حتى لو مخفي بصريًا)
      // عشان المتصفح -خصوصًا كروم أندرويد- يرسم فريمات الفيديو فعليًا على الكانفاس.
      // لو سبناه برّه الـ DOM، الصوت بيشتغل عادي لكن الكانفاس بيفضل أسود.
      videoEl.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;';
      videoEl.src = URL.createObjectURL(file);
      document.body.appendChild(videoEl);

      function cleanup(){
        URL.revokeObjectURL(videoEl.src);
        videoEl.remove();
      }

      videoEl.onloadedmetadata = async () => {
        const duration = Math.min(videoEl.duration || MAX_VIDEO_SECONDS, MAX_VIDEO_SECONDS);

        // عشان نسمح بفيديوهات أطول من غير ما نتعدى حد حجم مستند Firestore،
        // بنقلل الدقة والـ bitrate والـ fps تدريجيًا كل ما المدة كانت أطول.
        // الميزانية التقريبية للبايتات/ثانية = (الحجم الأقصى المسموح به / المدة)، مع هامش أمان.
        const bytesBudgetPerSecond = (MAX_MEDIA_BYTES * 0.74) / duration; // 0.74 لتعويض تضخم base64 وحاوية webm
        let targetWidth, fps, videoBitsPerSecond;

        if(duration <= 8){
          targetWidth = 640; fps = 30; videoBitsPerSecond = 800000;
        } else if(duration <= 15){
          targetWidth = 540; fps = 24; videoBitsPerSecond = 500000;
        } else if(duration <= 25){
          targetWidth = 480; fps = 20; videoBitsPerSecond = 350000;
        } else {
          targetWidth = 360; fps = 15; videoBitsPerSecond = 200000;
        }

        // سقف إضافي مبني على الميزانية الفعلية المتاحة
        const computedBitsPerSecond = Math.floor(bytesBudgetPerSecond * 8);
        videoBitsPerSecond = Math.min(videoBitsPerSecond, Math.max(computedBitsPerSecond, 80000));

        const scale = targetWidth / videoEl.videoWidth;
        const targetHeight = Math.round(videoEl.videoHeight * scale);

        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext('2d');

        const canvasStream = canvas.captureStream(fps);

        try{
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const sourceNode = audioCtx.createMediaElementSource(videoEl);
          const destNode = audioCtx.createMediaStreamDestination();
          sourceNode.connect(destNode);
          sourceNode.connect(audioCtx.destination);
          destNode.stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));
        } catch(e){ /* بدون صوت لو فشل */ }

        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
          ? 'video/webm;codecs=vp8,opus'
          : 'video/webm';
        const recorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond });
        const chunks = [];
        recorder.ondataavailable = (e) => { if(e.data.size > 0) chunks.push(e.data); };

        recorder.onstop = async () => {
          if(chunks.length === 0){
            cleanup();
            reject(new Error('تعذر تسجيل الفيديو، جربي فيديو تاني'));
            return;
          }
          const blob = new Blob(chunks, { type: 'video/webm' });
          const reader = new FileReader();
          reader.onload = () => { cleanup(); resolve(reader.result); };
          reader.onerror = () => { cleanup(); reject(new Error('فشل تحويل الفيديو')); };
          reader.readAsDataURL(blob);
        };

        let elapsed = 0;
        const frameInterval = 1000 / fps;

        videoEl.currentTime = 0;
        await videoEl.play().catch(() => {});
        recorder.start();

        const drawFrame = () => {
          if(videoEl.paused || videoEl.ended || elapsed >= duration){
            recorder.stop();
            videoEl.pause();
            return;
          }
          ctx.drawImage(videoEl, 0, 0, targetWidth, targetHeight);
          elapsed += frameInterval / 1000;
          setTimeout(drawFrame, frameInterval);
        };
        drawFrame();
      };

      videoEl.onerror = () => { cleanup(); reject(new Error('صيغة الفيديو غير مدعومة')); };
    });
  }

  function estimateBase64Bytes(dataUrl){
    const base64 = dataUrl.split(',')[1] || '';
    return Math.round(base64.length * 0.75);
  }

  function showPreview(){
    if(pendingMediaType === 'image'){
      previewMedia.innerHTML = `<img src="${pendingDataUrl}" alt="معاينة">`;
    } else {
      previewMedia.innerHTML = `<video src="${pendingDataUrl}" autoplay loop muted playsinline></video>`;
    }
    previewStage.classList.add('show');
  }

  cancelBtn.addEventListener('click', () => {
    pendingDataUrl = null;
    pendingMediaType = null;
    previewMedia.innerHTML = '';
    previewStage.classList.remove('show');
  });

  sendStatusBtn.addEventListener('click', async () => {
    if(!pendingDataUrl || !currentUser) return;
    sendStatusBtn.disabled = true;
    uploadStatusText.textContent = 'جاري نشر الحالة...';
    uploadStatusOverlay.classList.add('show');

    try{
      let userName = currentUser.displayName || 'مستخدم';
      let userPhoto = currentUser.photoURL || null;
      try{
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        if(snap.exists()){
          userName = snap.data().name || userName;
          userPhoto = snap.data().photoURL || userPhoto;
        }
      } catch(e){ /* تجاهل */ }

      const now = Date.now();
      const expiresAt = Timestamp.fromMillis(now + 24 * 60 * 60 * 1000);

      await addDoc(collection(db, 'statuses'), {
        uid: currentUser.uid,
        name: userName,
        photoURL: userPhoto,
        mediaType: pendingMediaType,
        mediaData: pendingDataUrl,
        createdAt: serverTimestamp(),
        expiresAt: expiresAt,
        viewedBy: [],
        hiddenFrom: []
      });

      window.location.href = 'chat.html';
    } catch(error){
      uploadStatusOverlay.classList.remove('show');
      sendStatusBtn.disabled = false;
      showError('تعذر نشر الحالة: ' + error.message);
    }
  });
</script>

</body>
</html>
