<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AChat | حالة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
    --danger:#FF5D75;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    background:#000;
    overflow:hidden;
    position:relative;
    user-select:none;
  }

  .status-screen{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
  }
  .status-screen.active{ display:flex; }

  .progress-row{
    display:flex;
    gap:4px;
    padding:10px 10px 0;
    flex-shrink:0;
    z-index:5;
  }
  .progress-track{
    flex:1;
    height:3px;
    background:rgba(255,255,255,.25);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:#fff;
    border-radius:3px;
  }
  .progress-fill.filled{ width:100%; }
  .progress-fill.animating{ transition:width linear; }

  .status-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    flex-shrink:0;
    z-index:5;
  }
  .status-header .avatar{
    width:36px; height:36px;
    border-radius:50%;
    overflow:hidden;
    background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px;
    flex-shrink:0;
  }
  .status-header .avatar img{ width:100%; height:100%; object-fit:cover; }
  .status-header .meta{ flex:1; min-width:0; }
  .status-header .name{ font-size:14px; font-weight:700; }
  .status-header .time{ font-size:11.5px; color:rgba(255,255,255,.6); }
  .status-header .close-btn{
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    flex-shrink:0;
  }

  .status-media-area{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .status-media-area img, .status-media-area video{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
  }

  .tap-zone{
    position:absolute;
    top:0; bottom:0;
    width:33%;
    z-index:4;
  }
  .tap-zone.left{ left:0; }
  .tap-zone.right{ right:0; }

  .delete-own-btn{
    position:absolute;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,93,117,.9);
    color:#fff;
    border:none;
    border-radius:22px;
    padding:10px 22px;
    font-family:inherit;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    z-index:5;
  }

  .empty-msg{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    gap:10px;
    color:var(--muted);
    text-align:center;
    padding:30px;
  }
</style>
</head>
<body>

  <div class="empty-msg" id="emptyMsg" style="display:none;">
    <span>جاري التحميل...</span>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    collection, query, where, onSnapshot, doc, updateDoc, deleteDoc, arrayUnion
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const targetUid = params.get('uid');
  const STATUS_DURATION_MS = 5000;

  let currentUser = null;
  let statuses = [];
  let currentIndex = 0;
  let progressTimer = null;
  let progressDuration = STATUS_DURATION_MS;

  if(!targetUid){
    window.location.href = 'chat.html';
  }

  onAuthStateChanged(auth, (user) => {
    if(!user){ window.location.href = 'index.html'; return; }
    currentUser = user;
    loadStatuses();
  });

  function loadStatuses(){
    const statusesRef = collection(db, 'statuses');
    const q = query(statusesRef, where('uid', '==', targetUid));

    onSnapshot(q, (snapshot) => {
      const active = snapshot.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(s => {
          const expiresAtMs = s.expiresAt && s.expiresAt.toMillis ? s.expiresAt.toMillis() : 0;
          return expiresAtMs > Date.now();
        })
        .sort((a, b) => {
          const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
          const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
          return ta - tb;
        });

      if(active.length === 0){
        document.getElementById('emptyMsg').style.display = 'flex';
        document.getElementById('emptyMsg').innerHTML = '<span>لا توجد حالات متاحة حاليًا</span>';
        setTimeout(() => window.location.href = 'chat.html', 1400);
        return;
      }

      const isFirstLoad = statuses.length === 0;
      statuses = active;
      buildScreens();

      if(isFirstLoad){
        playStatus(0);
      }
    });
  }

  function buildScreens(){
    document.querySelectorAll('.status-screen').forEach(el => el.remove());

    statuses.forEach((s, i) => {
      const screen = document.createElement('div');
      screen.className = 'status-screen';
      screen.dataset.index = i;

      const progressBars = statuses.map((_, j) => `
        <div class="progress-track">
          <div class="progress-fill ${j < i ? 'filled' : ''}" data-bar="${j}"></div>
        </div>
      `).join('');

      const time = formatRelativeTime(s.createdAt);
      const avatarInner = s.photoURL
        ? `<img src="${s.photoURL}" alt="${s.name}">`
        : (s.name || '؟').charAt(0).toUpperCase();

      const mediaHtml = s.mediaType === 'video'
        ? `<video src="${s.mediaData}" playsinline></video>`
        : `<img src="${s.mediaData}" alt="حالة">`;

      const isMine = s.uid === currentUser.uid;

      screen.innerHTML = `
        <div class="progress-row">${progressBars}</div>
        <div class="status-header">
          <div class="avatar">${avatarInner}</div>
          <div class="meta">
            <div class="name">${escapeHtml(s.name || 'مستخدم')}</div>
            <div class="time">${time}</div>
          </div>
          <button type="button" class="close-btn" id="closeBtn-${i}">✕</button>
        </div>
        <div class="status-media-area">
          ${mediaHtml}
          <div class="tap-zone left" data-action="prev"></div>
          <div class="tap-zone right" data-action="next"></div>
        </div>
        ${isMine ? `<button type="button" class="delete-own-btn" id="deleteBtn-${i}">حذف الحالة</button>` : ''}
      `;

      document.body.appendChild(screen);

      screen.querySelector(`#closeBtn-${i}`).addEventListener('click', () => {
        window.location.href = 'chat.html';
      });

      screen.querySelectorAll('.tap-zone').forEach(zone => {
        zone.addEventListener('click', () => {
          if(zone.dataset.action === 'next') goNext();
          else goPrev();
        });
      });

      const video = screen.querySelector('video');
      if(video){
        video.addEventListener('loadedmetadata', () => {
          if(currentIndex === i){
            progressDuration = Math.min(video.duration * 1000, 15000) || STATUS_DURATION_MS;
          }
        });
      }

      const deleteBtn = screen.querySelector(`#deleteBtn-${i}`);
      if(deleteBtn){
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if(!confirm('تأكيد حذف الحالة؟')) return;
          try{
            await deleteDoc(doc(db, 'statuses', s.id));
          } catch(err){
            alert('تعذر حذف الحالة: ' + err.message);
          }
        });
      }
    });
  }

  function playStatus(index){
    if(index < 0){ window.location.href = 'chat.html'; return; }
    if(index >= statuses.length){ window.location.href = 'chat.html'; return; }

    currentIndex = index;
    const screens = document.querySelectorAll('.status-screen');
    screens.forEach((s, i) => s.classList.toggle('active', i === index));

    const status = statuses[index];
    markAsViewed(status);

    const activeScreen = screens[index];
    const video = activeScreen.querySelector('video');

    clearTimeout(progressTimer);
    resetBarsBefore(index);

    if(video){
      progressDuration = 8000;
      video.currentTime = 0;
      video.play().catch(() => {});
      video.onended = () => goNext();
    } else {
      progressDuration = STATUS_DURATION_MS;
    }

    startProgressBar(index);
  }

  function resetBarsBefore(index){
    document.querySelectorAll(`.status-screen[data-index="${index}"] .progress-fill`).forEach(bar => {
      const barIdx = parseInt(bar.dataset.bar);
      bar.classList.remove('animating');
      bar.style.width = barIdx < index ? '100%' : '0%';
    });
  }

  function startProgressBar(index){
    const bar = document.querySelector(`.status-screen[data-index="${index}"] .progress-fill[data-bar="${index}"]`);
    if(!bar) return;

    requestAnimationFrame(() => {
      bar.classList.add('animating');
      bar.style.transitionDuration = progressDuration + 'ms';
      bar.style.width = '100%';
    });

    progressTimer = setTimeout(() => {
      goNext();
    }, progressDuration);
  }

  function goNext(){
    clearTimeout(progressTimer);
    const activeScreen = document.querySelector('.status-screen.active');
    const video = activeScreen?.querySelector('video');
    if(video) video.pause();
    playStatus(currentIndex + 1);
  }

  function goPrev(){
    clearTimeout(progressTimer);
    const activeScreen = document.querySelector('.status-screen.active');
    const video = activeScreen?.querySelector('video');
    if(video) video.pause();
    playStatus(currentIndex - 1);
  }

  async function markAsViewed(status){
    if(status.uid === currentUser.uid) return;
    if((status.viewedBy || []).includes(currentUser.uid)) return;
    try{
      await updateDoc(doc(db, 'statuses', status.id), {
        viewedBy: arrayUnion(currentUser.uid)
      });
    } catch(e){ /* تجاهل */ }
  }

  function formatRelativeTime(timestamp){
    if(!timestamp || !timestamp.toMillis) return 'الآن';
    const ms = timestamp.toMillis();
    const diffMin = Math.floor((Date.now() - ms) / 60000);
    if(diffMin < 1) return 'الآن';
    if(diffMin < 60) return `منذ ${diffMin} ${diffMin === 1 ? 'دقيقة' : 'دقائق'}`;
    const diffHr = Math.floor(diffMin / 60);
    return `منذ ${diffHr} ${diffHr === 1 ? 'ساعة' : 'ساعات'}`;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
