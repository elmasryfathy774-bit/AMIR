<title>AChat | إنشاء حساب</title>

<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-dim:#17B6D6;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
    --danger:#FF5D75;
    --ring: rgba(47,224,255,.28);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 18% 12%, rgba(47,224,255,.12), transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(26,79,209,.16), transparent 42%),
      var(--void);
  }

  .shell{
    width:100%;
    max-width:960px;
    min-height:600px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:28px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
    box-shadow:0 40px 90px -25px rgba(0,0,0,.65), 0 0 70px -30px rgba(47,224,255,.35);
  }

  /* ===== Brand panel ===== */
  .brand{
    background:linear-gradient(160deg, #0B1020, #0E1B2E 55%, #070B14);
    color:#fff;
    position:relative;
    padding:48px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
  }
  .brand::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:30px 30px;
    -webkit-mask-image: radial-gradient(circle at 30% 20%, black, transparent 70%);
    mask-image: radial-gradient(circle at 30% 20%, black, transparent 70%);
  }
  .brand::after{
    content:"";
    position:absolute;
    width:260px; height:260px;
    border-radius:50%;
    background:rgba(47,224,255,.14);
    filter:blur(40px);
    bottom:-80px; right:-80px;
  }

  .bubble-float{
    position:absolute;
    background:rgba(47,224,255,.08);
    border:1px solid rgba(47,224,255,.16);
    border-radius:18px;
    animation:drift 9s ease-in-out infinite;
  }
  .bubble-float.b1{ width:64px; height:40px; top:18%; right:18%; animation-delay:0s; border-bottom-right-radius:4px;}
  .bubble-float.b2{ width:44px; height:30px; top:55%; left:10%; animation-delay:2.4s; border-bottom-left-radius:4px;}
  .bubble-float.b3{ width:36px; height:36px; bottom:22%; right:30%; border-radius:50%; animation-delay:4.8s;}

  @keyframes drift{
    0%,100%{ transform:translateY(0); opacity:.5; }
    50%{ transform:translateY(-14px); opacity:1; }
  }

  .brand-top{ position:relative; z-index:1; }
  .logo{
    display:flex; align-items:center; gap:10px;
    font-weight:900; font-size:22px; letter-spacing:.5px;
  }
  .logo-mark{
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    box-shadow:0 6px 18px -6px rgba(47,224,255,.6);
    overflow:hidden;
  }
  .status-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--cyan);
    display:inline-block;
    margin-right:auto;
    animation:pulse 2.2s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(47,224,255,.55); }
    70%{ box-shadow:0 0 0 9px rgba(47,224,255,0); }
    100%{ box-shadow:0 0 0 0 rgba(47,224,255,0); }
  }

  .brand-mid{ position:relative; z-index:1; }
  .brand-mid h1{
    font-size:clamp(28px,4vw,38px);
    font-weight:900;
    line-height:1.3;
    margin-bottom:14px;
  }
  .accent-text{
    background:linear-gradient(90deg,var(--cyan), #9AF3FF);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .brand-mid p{
    color:rgba(234,242,250,.65);
    font-size:15px;
    line-height:1.9;
    max-width:340px;
  }

  .typing-chip{
    margin-top:28px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--border-soft);
    padding:10px 16px;
    border-radius:999px;
    width:fit-content;
  }
  .typing-chip span.dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--cyan);
    display:inline-block;
    animation:bounce 1.2s infinite ease-in-out;
  }
  .typing-chip span.dot:nth-child(2){ animation-delay:.15s; }
  .typing-chip span.dot:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{
    0%,60%,100%{ transform:translateY(0); opacity:.5; }
    30%{ transform:translateY(-4px); opacity:1; }
  }
  .typing-chip small{ color:rgba(234,242,250,.55); font-size:12.5px; }

  .brand-bottom{ position:relative; z-index:1; font-size:12.5px; color:rgba(234,242,250,.35); }

  /* ===== Form panel ===== */
  .form-panel{
    padding:48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow-y:auto;
  }
  .form-head{ margin-bottom:28px; }
  .form-head h2{ font-size:26px; font-weight:800; margin-bottom:6px; color:var(--text); }
  .form-head p{ color:var(--muted); font-size:14.5px; }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:13.5px;
    font-weight:600;
    margin-bottom:7px;
    color:var(--text);
  }
  .input-wrap{ position:relative; }
  .input-wrap input{
    width:100%;
    padding:13px 44px 13px 16px;
    border:1.5px solid var(--border-soft);
    border-radius:12px;
    font-family:inherit;
    font-size:14.5px;
    color:var(--text);
    background:var(--surface-2);
    outline:none;
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  .input-wrap input::placeholder{ color:#52607A; }
  .input-wrap input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 4px var(--ring);
  }
  .input-wrap input.error{ border-color:var(--danger); }
  .input-wrap input.error:focus{ box-shadow:0 0 0 4px rgba(255,93,117,.18); }
  .toggle-eye{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    cursor:pointer;
    color:var(--muted);
    font-size:13px;
    padding:4px;
    line-height:1;
  }
  .toggle-eye:hover{ color:var(--cyan); }
  .err-msg{
    color:var(--danger);
    font-size:12.5px;
    margin-top:6px;
    min-height:16px;
    display:none;
  }
  .err-msg.show{ display:block; }

  .btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,var(--cyan), var(--cyan-deep));
    color:#06121C;
    font-family:inherit;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:8px;
    transition:filter .15s, transform .1s, box-shadow .15s;
    box-shadow:0 10px 24px -10px rgba(47,224,255,.55);
  }
  .btn-primary:hover{ filter:brightness(1.08); box-shadow:0 14px 30px -10px rgba(47,224,255,.7); }
  .btn-primary:active{ transform:scale(.99); }
  .btn-primary:disabled{ opacity:.7; cursor:not-allowed; }

  .spinner{
    width:16px; height:16px;
    border:2.5px solid rgba(6,18,28,.35);
    border-top-color:#06121C;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .spinner.show{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .divider{
    display:flex; align-items:center; gap:12px;
    margin:22px 0;
    color:var(--muted);
    font-size:12.5px;
  }
  .divider::before, .divider::after{ content:""; flex:1; height:1px; background:var(--border-soft); }

  .signup-prompt{ text-align:center; font-size:14px; color:var(--muted); }
  .signup-prompt a{ color:var(--cyan); font-weight:700; text-decoration:none; }
  .signup-prompt a:hover{ text-decoration:underline; }

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);
    border:1px solid var(--border-soft);
    color:var(--text);
    padding:14px 22px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    box-shadow:0 18px 40px -12px rgba(0,0,0,.55), 0 0 30px -14px rgba(47,224,255,.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s, transform .25s;
    z-index:50;
    text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:820px){
    .shell{ grid-template-columns:1fr; min-height:auto; }
    .brand{ padding:36px 32px; min-height:200px; }
    .brand-mid p{ display:none; }
    .typing-chip{ margin-top:18px; }
    .form-panel{ padding:36px 32px; }
  }

  a:focus-visible, button:focus-visible, input:focus-visible{
    outline:2px solid var(--cyan);
    outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    .bubble-float, .typing-chip span.dot, .spinner, .status-dot{ animation:none !important; }
  }
</style>
</head>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const form = document.getElementById('signupForm');
  const nameInput = document.getElementById('name');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const nameErr = document.getElementById('nameErr');
  const emailErr = document.getElementById('emailErr');
  const passwordErr = document.getElementById('passwordErr');
  const toggleEye = document.getElementById('toggleEye');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const toast = document.getElementById('toast');

  toggleEye.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleEye.textContent = isPassword ? 'إخفاء' : 'إظهار';
  });

  function showError(input, errEl, message){
    input.classList.add('error');
    errEl.textContent = message;
    errEl.classList.add('show');
  }
  function clearError(input, errEl){
    input.classList.remove('error');
    errEl.textContent = '';
    errEl.classList.remove('show');
  }
  function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  nameInput.addEventListener('input', () => clearError(nameInput, nameErr));
  emailInput.addEventListener('input', () => clearError(emailInput, emailErr));
  passwordInput.addEventListener('input', () => clearError(passwordInput, passwordErr));

  function isValidEmail(value){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  // ====================================================
  // إنشاء حساب حقيقي عبر Firebase Authentication
  // + حفظ بيانات المستخدم في Firestore (لازمة لاحقًا
  // عشان نعرض قائمة المستخدمين)
  // ====================================================
  async function signupWithFirebase(name, email, password){
    const credential = await createUserWithEmailAndPassword(auth, email, password);
    const user = credential.user;

    await updateProfile(user, { displayName: name });

    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      name: name,
      displayName: name,
      email: email,
      photoURL: null,
      isOnline: true,
      createdAt: serverTimestamp()
    });

    return user;
  }

  function getFirebaseErrorMessage(code){
    const messages = {
      'auth/email-already-in-use': 'البريد الإلكتروني ده مستخدم بالفعل',
      'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة',
      'auth/weak-password': 'كلمة المرور لازم تكون 6 حروف على الأقل',
      'auth/network-request-failed': 'في مشكلة بالاتصال بالإنترنت'
    };
    return messages[code] || 'حصل خطأ غير متوقع، حاولي تاني';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    let valid = true;

    clearError(nameInput, nameErr);
    clearError(emailInput, emailErr);
    clearError(passwordInput, passwordErr);

    if(!name){
      showError(nameInput, nameErr, 'الاسم مطلوب');
      valid = false;
    }

    if(!email){
      showError(emailInput, emailErr, 'البريد الإلكتروني مطلوب');
      valid = false;
    } else if(!isValidEmail(email)){
      showError(emailInput, emailErr, 'صيغة البريد الإلكتروني غير صحيحة');
      valid = false;
    }

    if(!password){
      showError(passwordInput, passwordErr, 'كلمة المرور مطلوبة');
      valid = false;
    } else if(password.length < 6){
      showError(passwordInput, passwordErr, 'كلمة المرور لازم تكون 6 حروف على الأقل');
      valid = false;
    }

    if(!valid) return;

    submitBtn.disabled = true;
    spinner.classList.add('show');
    btnText.textContent = 'جاري إنشاء الحساب...';

    try{
      await signupWithFirebase(name, email, password);
      showToast('تم إنشاء الحساب بنجاح، جاري التحويل...');
      setTimeout(() => { window.location.href = 'chat.html'; }, 700);
    } catch(error){
      showToast(getFirebaseErrorMessage(error.code));
      submitBtn.disabled = false;
      spinner.classList.remove('show');
      btnText.textContent = 'إنشاء الحساب';
    }
  });
</script>
