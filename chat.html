<title>AChat | الرئيسية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(47,224,255,.10), transparent 38%),
      radial-gradient(circle at 88% 85%, rgba(26,79,209,.14), transparent 42%),
      var(--void);
  }

  .topbar{
    background:rgba(14,21,38,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft);
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo{
    display:flex; align-items:center; gap:10px;
    font-weight:900; font-size:19px;
  }
  .logo-mark{
    width:32px; height:32px; border-radius:9px;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    box-shadow:0 6px 16px -6px rgba(47,224,255,.6);
    overflow:hidden;
  }
  .user-chip{
    display:flex; align-items:center; gap:10px;
    font-size:14px;
  }
  .user-chip .avatar{
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px;
    flex-shrink:0;
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
    font-family:inherit;
  }
  .user-chip .avatar img{ width:100%; height:100%; object-fit:cover; }

  /* ===== Profile modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(5,8,16,.7);
    backdrop-filter:blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:22px;
    padding:30px 26px;
    max-width:340px;
    width:100%;
    text-align:center;
    box-shadow:0 30px 70px -25px rgba(0,0,0,.6);
  }
  .modal-box h2{ font-size:17px; font-weight:800; margin-bottom:20px; }
  .modal-avatar-wrap{
    position:relative;
    width:100px; height:100px;
    margin:0 auto 22px;
  }
  .modal-avatar{
    width:100px; height:100px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:34px;
    overflow:hidden;
  }
  .modal-avatar img{ width:100%; height:100%; object-fit:cover; }
  .modal-avatar-edit{
    position:absolute;
    bottom:-2px; left:-2px;
    width:34px; height:34px;
    border-radius:50%;
    background:var(--cyan);
    color:#06121C;
    border:3px solid var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    cursor:pointer;
  }
  .modal-avatar-edit:hover{ filter:brightness(1.1); }
  .modal-name{ font-weight:700; font-size:15px; margin-bottom:2px; }
  .modal-email{ color:var(--muted); font-size:13px; margin-bottom:6px; }
  .modal-status{
    min-height:18px;
    font-size:12.5px;
    color:var(--muted);
    margin:8px 0 4px;
  }
  .modal-status.error{ color:#FF5D75; }
  .modal-status.success{ color:var(--cyan); }
  .modal-close{
    margin-top:18px;
    width:100%;
    padding:11px;
    border-radius:11px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--border-soft);
    color:var(--text);
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .modal-close:hover{ border-color:var(--cyan); color:var(--cyan); }
  .logout-btn{
    background:rgba(255,255,255,.05);
    border:1px solid var(--border-soft);
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    border-radius:9px;
    cursor:pointer;
    margin-right:8px;
  }
  .logout-btn:hover{ border-color:var(--cyan); color:var(--cyan); }

  .page-head{
    max-width:560px;
    margin:0 auto;
    padding:26px 20px 6px;
  }
  .page-head h1{ font-size:20px; font-weight:800; margin-bottom:4px; }
  .page-head p{ color:var(--muted); font-size:13.5px; }

  .search-wrap{ max-width:560px; margin:16px auto 0; padding:0 20px; }

  /* ===== Status bar (الحالات) ===== */
  .status-bar{
    max-width:560px;
    margin:22px auto 0;
    padding:0 20px;
  }
  .status-scroll{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding:2px 2px 8px;
    scrollbar-width:none;
  }
  .status-scroll::-webkit-scrollbar{ display:none; }
  .status-item{
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    width:62px;
    cursor:pointer;
  }
  .status-ring{
    width:56px; height:56px;
    border-radius:50%;
    padding:2.5px;
    background:rgba(255,255,255,.1);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:transform .12s;
  }
  .status-item:active .status-ring{ transform:scale(.94); }
  .status-ring.has-new{
    background:linear-gradient(135deg, var(--cyan), var(--cyan-deep));
  }
  .status-ring.seen{
    background:rgba(124,138,163,.4);
  }
  .status-avatar{
    width:100%; height:100%;
    border-radius:50%;
    background:var(--surface-2);
    border:2.5px solid var(--void);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    font-weight:800; font-size:18px;
    color:var(--text);
    position:relative;
  }
  .status-avatar img{ width:100%; height:100%; object-fit:cover; }
  .status-avatar.add-status::after{
    content:"+";
    position:absolute;
    bottom:-3px; right:-3px;
    width:20px; height:20px;
    border-radius:50%;
    background:var(--cyan);
    color:#06121C;
    font-size:15px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
    border:2.5px solid var(--void);
  }
  .status-label{
    font-size:11px;
    color:var(--muted);
    max-width:62px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .status-item.my-status .status-label{ color:var(--text); font-weight:600; }

  .search-wrap input{
    width:100%;
    padding:12px 16px;
    border:1.5px solid var(--border-soft);
    border-radius:12px;
    font-family:inherit;
    font-size:14px;
    color:var(--text);
    background:var(--surface-2);
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search-wrap input::placeholder{ color:#52607A; }
  .search-wrap input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 4px rgba(47,224,255,.2);
  }

  .list-wrap{ max-width:560px; margin:18px auto 60px; padding:0 20px; }

  .user-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
    transition:border-color .15s, transform .1s, background .15s;
  }
  .user-card:hover{ border-color:rgba(47,224,255,.35); background:var(--surface-2); }
  .user-card:active{ transform:scale(.99); }

  .avatar{
    width:46px; height:46px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:17px;
    flex-shrink:0;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .user-info{ flex:1; min-width:0; }
  .user-info .name{ font-weight:700; font-size:15px; margin-bottom:2px; display:flex; align-items:center; gap:6px; }
  .user-info .sub{ color:var(--muted); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .blocked-badge{
    font-size:10.5px;
    font-weight:700;
    color:#FF5D75;
    background:rgba(255,93,117,.12);
    border:1px solid rgba(255,93,117,.3);
    padding:2px 7px;
    border-radius:6px;
  }
  .user-card.is-blocked{ opacity:.6; }
  .chat-arrow{ color:var(--muted); font-size:18px; }

  .empty-state, .loading-state{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:60px 20px;
  }
  .empty-state .icon{ font-size:34px; margin-bottom:10px; }

  /* ===== Incoming call overlay ===== */
  .incoming-call-overlay{
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 22% 18%, rgba(47,224,255,.14), transparent 42%),
      radial-gradient(circle at 85% 80%, rgba(26,79,209,.18), transparent 46%),
      var(--void);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:48px 24px 40px;
    text-align:center;
    z-index:200;
  }
  .incoming-call-overlay.show{ display:flex; }
  .incoming-top{ font-size:13.5px; color:var(--muted); font-weight:600; }
  .incoming-mid{ display:flex; flex-direction:column; align-items:center; gap:20px; }
  .incoming-avatar{
    width:120px; height:120px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:42px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 0 1px var(--border-soft);
  }
  .incoming-avatar img{ width:100%; height:100%; object-fit:cover; }
  .incoming-avatar::after{
    content:"";
    position:absolute; inset:-10px;
    border-radius:50%;
    border:1.5px solid rgba(47,224,255,.35);
    animation:incomingRing 1.8s ease-out infinite;
  }
  @keyframes incomingRing{
    0%{ transform:scale(.94); opacity:.9; }
    80%{ transform:scale(1.18); opacity:0; }
    100%{ opacity:0; }
  }
  .incoming-name{ font-size:21px; font-weight:800; }
  .incoming-sub{ font-size:13.5px; color:var(--muted); }
  .incoming-actions{ display:flex; align-items:center; justify-content:center; gap:26px; }
  .incoming-btn{
    width:64px; height:64px;
    border-radius:50%;
    border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:25px;
    cursor:pointer;
  }
  .incoming-btn.reject{ background:linear-gradient(135deg, var(--danger), #C73B54); color:#fff; box-shadow:0 10px 26px -10px rgba(255,93,117,.6); }
  .incoming-btn.accept{ background:linear-gradient(135deg, #2FE08A, #17B66E); color:#06121C; box-shadow:0 10px 26px -10px rgba(47,224,138,.6); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    collection, onSnapshot, doc, setDoc, getDoc, updateDoc,
    query, where, orderBy, addDoc, deleteDoc, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const userLabel = document.getElementById('userLabel');
  const avatar = document.getElementById('avatar');
  const logoutBtn = document.getElementById('logoutBtn');
  const listWrap = document.getElementById('listWrap');
  const loadingState = document.getElementById('loadingState');
  const searchInput = document.getElementById('searchInput');

  const profileModal = document.getElementById('profileModal');
  const modalAvatar = document.getElementById('modalAvatar');
  const modalAvatarEdit = document.getElementById('modalAvatarEdit');
  const avatarFileInput = document.getElementById('avatarFileInput');
  const modalName = document.getElementById('modalName');
  const modalEmail = document.getElementById('modalEmail');
  const modalStatus = document.getElementById('modalStatus');
  const modalCloseBtn = document.getElementById('modalCloseBtn');

  let currentUser = null;
  let allUsers = [];

  // حماية الصفحة: لو مفيش مستخدم مسجل دخول، رجّعيه لصفحة الدخول
  onAuthStateChanged(auth, async (user) => {
    if(!user){
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    const displayName = user.displayName || user.email;
    userLabel.textContent = displayName;

    // جلب صورة البروفايل من Firestore (مخزنة هناك مش في حساب Auth)
    try{
      const snap = await getDoc(doc(db, 'users', user.uid));
      if(snap.exists() && snap.data().photoURL){
        currentUser.photoURL = snap.data().photoURL;
      }
    } catch(e){ /* تجاهل، هيظهر الحرف الأول بدالاً من الصورة */ }

    renderTopAvatar(currentUser);
    listenToUsers();
    listenToIncomingCalls();
    listenToStatuses();
  });

  logoutBtn.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'index.html';
  });

  // ====================================================
  // عرض صورة البروفايل (أو الحرف الأول لو مفيش صورة)
  // ====================================================
  function renderTopAvatar(user){
    const initial = (user.displayName || user.email || '؟').charAt(0).toUpperCase();
    avatar.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" alt="صورتي">`
      : initial;
  }

  // ====================================================
  // فتح وإغلاق مودال البروفايل
  // ====================================================
  function openProfileModal(){
    const displayName = currentUser.displayName || currentUser.email;
    const initial = displayName.charAt(0).toUpperCase();
    modalAvatar.innerHTML = currentUser.photoURL
      ? `<img src="${currentUser.photoURL}" alt="صورتي">`
      : initial;
    modalName.textContent = displayName;
    modalEmail.textContent = currentUser.email;
    modalStatus.textContent = '';
    modalStatus.className = 'modal-status';
    profileModal.classList.add('show');
  }
  function closeProfileModal(){
    profileModal.classList.remove('show');
  }

  avatar.addEventListener('click', openProfileModal);
  modalCloseBtn.addEventListener('click', closeProfileModal);
  profileModal.addEventListener('click', (e) => {
    if(e.target === profileModal) closeProfileModal();
  });

  // ====================================================
  // رفع صورة بروفايل: بنضغطها ونحولها Base64 ونحفظها
  // مباشرة جوه مستند المستخدم في Firestore (من غير Storage)
  // ====================================================
  modalAvatarEdit.addEventListener('click', () => avatarFileInput.click());

  avatarFileInput.addEventListener('change', async () => {
    const file = avatarFileInput.files[0];
    if(!file) return;

    if(!file.type.startsWith('image/')){
      modalStatus.textContent = 'لازم تختاري ملف صورة';
      modalStatus.className = 'modal-status error';
      return;
    }
    if(file.size > 8 * 1024 * 1024){
      modalStatus.textContent = 'حجم الصورة لازم يكون أقل من 8 ميجا';
      modalStatus.className = 'modal-status error';
      return;
    }

    modalStatus.textContent = 'جاري معالجة الصورة...';
    modalStatus.className = 'modal-status';

    try{
      const dataUrl = await resizeImageToDataUrl(file, 256, 0.78);

      // مستندات Firestore حدها الأقصى 1 ميجا، فبنتأكد إن الصورة المضغوطة صغيرة بأمان
      if(dataUrl.length > 700000){
        modalStatus.textContent = 'الصورة دي معقدة جدًا، جربي صورة تانية أبسط';
        modalStatus.className = 'modal-status error';
        return;
      }

      await setDoc(doc(db, 'users', currentUser.uid), { photoURL: dataUrl }, { merge: true });
      currentUser.photoURL = dataUrl; // تحديث محلي فوري، من غير الاعتماد على Auth profile

      modalAvatar.innerHTML = `<img src="${dataUrl}" alt="صورتي">`;
      renderTopAvatar(currentUser);

      modalStatus.textContent = 'تم تحديث الصورة بنجاح ✓';
      modalStatus.className = 'modal-status success';
    } catch(error){
      modalStatus.textContent = 'حصل خطأ أثناء معالجة الصورة: ' + error.message;
      modalStatus.className = 'modal-status error';
    } finally {
      avatarFileInput.value = '';
    }
  });

  // بتاخد ملف صورة، بتصغرها لمقاس مربع (maxSize) وبتضغطها كـ JPEG
  // وبترجع Data URL (نص Base64) جاهز للتخزين في Firestore
  function resizeImageToDataUrl(file, maxSize, quality){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('فشل قراءة الملف'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('الملف مش صورة صالحة'));
        img.onload = () => {
          // قص الصورة لمربع من النص قبل التصغير، عشان تظهر كويس كأفاتار دائري
          const side = Math.min(img.width, img.height);
          const sx = (img.width - side) / 2;
          const sy = (img.height - side) / 2;

          const canvas = document.createElement('canvas');
          canvas.width = maxSize;
          canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, sx, sy, side, side, 0, 0, maxSize, maxSize);

          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ====================================================
  // جلب كل المستخدمين من Firestore بشكل لحظي (real-time)
  // ====================================================
  let myBlockedUsers = [];

  function listenToUsers(){
    // متابعة قائمة المحظورين بتاعتي أنا
    onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
      myBlockedUsers = snap.exists() ? (snap.data().blockedUsers || []) : [];
      renderUsers(allUsers);
    });

    const usersRef = collection(db, 'users');
    onSnapshot(usersRef, (snapshot) => {
      allUsers = snapshot.docs
        .map(d => d.data())
        .filter(u => u.uid !== currentUser.uid);
      renderUsers(allUsers);
    }, (error) => {
      loadingState.textContent = 'حصل خطأ في تحميل المستخدمين: ' + error.message;
    });
  }

  function renderUsers(users){
    if(users.length === 0){
      listWrap.innerHTML = '<div class="empty-state"><div class="icon">👥</div>لسه مفيش مستخدمين تانيين سجّلوا في AChat</div>';
      return;
    }

    listWrap.innerHTML = users.map(u => {
      const initial = (u.name || u.email || '؟').charAt(0).toUpperCase();
      const avatarInner = u.photoURL
        ? `<img src="${u.photoURL}" alt="${u.name || 'مستخدم'}">`
        : initial;
      const isBlocked = myBlockedUsers.includes(u.uid);
      return `
        <div class="user-card ${isBlocked ? 'is-blocked' : ''}" data-uid="${u.uid}" data-name="${u.name || 'مستخدم'}">
          <div class="avatar">${avatarInner}</div>
          <div class="user-info">
            <div class="name">${u.name || 'بدون اسم'} ${isBlocked ? '<span class="blocked-badge">محظور</span>' : ''}</div>
            <div class="sub">اضغطي لبدء المحادثة</div>
          </div>
          <div class="chat-arrow">‹</div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.user-card').forEach(card => {
      card.addEventListener('click', () => {
        const otherUid = card.dataset.uid;
        const otherName = card.dataset.name;
        // ترتيب الـ uid بتاعين المستخدمين عشان نولد معرّف ثابت للمحادثة بينهم
        const chatId = [currentUser.uid, otherUid].sort().join('_');
        window.location.href = `room.html?chatId=${encodeURIComponent(chatId)}&uid=${encodeURIComponent(otherUid)}&name=${encodeURIComponent(otherName)}`;
      });
    });
  }

  searchInput.addEventListener('input', () => {
    const term = searchInput.value.trim().toLowerCase();
    const filtered = allUsers.filter(u =>
      (u.name || '').toLowerCase().includes(term) ||
      (u.email || '').toLowerCase().includes(term)
    );
    renderUsers(filtered);
  });

  // ====================================================
  // الاستماع لمكالمة واردة (زي الواتساب: شاشة كاملة فورًا)
  // ====================================================
  const incomingCallOverlay = document.getElementById('incomingCallOverlay');
  const incomingAvatar = document.getElementById('incomingAvatar');
  const incomingName = document.getElementById('incomingName');
  const incomingAcceptBtn = document.getElementById('incomingAcceptBtn');
  const incomingRejectBtn = document.getElementById('incomingRejectBtn');

  let activeIncomingCallId = null;
  let activeIncomingCallerUid = null;

  function listenToIncomingCalls(){
    const callsRef = collection(db, 'calls');
    onSnapshot(callsRef, (snapshot) => {
      snapshot.docChanges().forEach(change => {
        const callChatId = change.doc.id;

        if(change.type === 'removed'){
          if(activeIncomingCallId === callChatId) hideIncomingCall();
          return;
        }

        const data = change.doc.data();
        const isForMe = data.calleeUid === currentUser.uid && data.status === 'ringing';

        if(isForMe && activeIncomingCallId !== callChatId){
          showIncomingCall(callChatId, data);
        } else if(activeIncomingCallId === callChatId && data.status !== 'ringing'){
          hideIncomingCall();
        }
      });
    });
  }

  async function showIncomingCall(callChatId, data){
    activeIncomingCallId = callChatId;
    activeIncomingCallerUid = data.callerUid;

    let callerName = data.callerName || 'مستخدم';
    let callerPhoto = null;
    try{
      const snap = await getDoc(doc(db, 'users', data.callerUid));
      if(snap.exists()){
        callerName = snap.data().name || callerName;
        callerPhoto = snap.data().photoURL || null;
      }
    } catch(e){ /* تجاهل */ }

    incomingName.textContent = callerName;
    incomingAvatar.innerHTML = callerPhoto
      ? `<img src="${callerPhoto}" alt="${callerName}">`
      : callerName.charAt(0).toUpperCase();

    incomingCallOverlay.classList.add('show');

    incomingAcceptBtn.onclick = () => {
      const callParams = new URLSearchParams({
        chatId: callChatId, uid: activeIncomingCallerUid, name: callerName, role: 'callee'
      });
      hideIncomingCall();
      window.location.href = `call.html?${callParams.toString()}`;
    };

    incomingRejectBtn.onclick = async () => {
      await updateDoc(doc(db, 'calls', callChatId), { status: 'rejected' }).catch(()=>{});
      hideIncomingCall();
    };
  }

  function hideIncomingCall(){
    incomingCallOverlay.classList.remove('show');
    activeIncomingCallId = null;
    activeIncomingCallerUid = null;
  }

  // ====================================================
  // الحالات (Status / Stories) - شريط أعلى قائمة المستخدمين
  // ====================================================
  const statusScroll = document.getElementById('statusScroll');
  let allStatuses = []; // كل الحالات السارية (لسه ما خلصتش 24 ساعة)
  let myStatuses = [];

  function listenToStatuses(){
    const statusesRef = collection(db, 'statuses');
    onSnapshot(statusesRef, (snapshot) => {
      const now = Date.now();
      const active = snapshot.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(s => {
          const expiresAtMs = s.expiresAt && s.expiresAt.toMillis ? s.expiresAt.toMillis() : 0;
          return expiresAtMs > now;
        });

      allStatuses = active.filter(s => s.uid !== currentUser.uid && !(s.hiddenFrom || []).includes(currentUser.uid));
      myStatuses = active.filter(s => s.uid === currentUser.uid);

      renderStatusBar();
    });
  }

  function renderStatusBar(){
    // تجميع حالات كل مستخدم في مكان واحد (ممكن يكون عند الشخص أكتر من حالة)
    const grouped = {};
    allStatuses.forEach(s => {
      if(!grouped[s.uid]) grouped[s.uid] = [];
      grouped[s.uid].push(s);
    });

    const myInitial = (currentUser.displayName || currentUser.email || '؟').charAt(0).toUpperCase();
    const myAvatarInner = currentUser.photoURL
      ? `<img src="${currentUser.photoURL}" alt="حالتي">`
      : myInitial;

    const myRingClass = myStatuses.length > 0 ? 'has-new' : '';
    const myStatusHtml = `
      <div class="status-item my-status" id="myStatusItem">
        <div class="status-ring ${myRingClass}">
          <div class="status-avatar ${myStatuses.length === 0 ? 'add-status' : ''}">${myAvatarInner}</div>
        </div>
        <span class="status-label">${myStatuses.length > 0 ? 'حالتي' : 'إضافة حالة'}</span>
      </div>
    `;

    const othersHtml = Object.keys(grouped).map(uid => {
      const userStatuses = grouped[uid];
      const first = userStatuses[0];
      const allSeen = userStatuses.every(s => (s.viewedBy || []).includes(currentUser.uid));
      const ringClass = allSeen ? 'seen' : 'has-new';
      const avatarInner = first.photoURL
        ? `<img src="${first.photoURL}" alt="${first.name || 'مستخدم'}">`
        : (first.name || '؟').charAt(0).toUpperCase();

      return `
        <div class="status-item" data-uid="${uid}">
          <div class="status-ring ${ringClass}">
            <div class="status-avatar">${avatarInner}</div>
          </div>
          <span class="status-label">${first.name || 'مستخدم'}</span>
        </div>
      `;
    }).join('');

    statusScroll.innerHTML = myStatusHtml + othersHtml;

    document.getElementById('myStatusItem').addEventListener('click', () => {
      if(myStatuses.length > 0){
        window.location.href = `status-view.html?uid=${encodeURIComponent(currentUser.uid)}`;
      } else {
        window.location.href = 'status-add.html';
      }
    });

    statusScroll.querySelectorAll('.status-item[data-uid]').forEach(item => {
      item.addEventListener('click', () => {
        const uid = item.dataset.uid;
        window.location.href = `status-view.html?uid=${encodeURIComponent(uid)}`;
      });
    });
  }
</script>

</body>
