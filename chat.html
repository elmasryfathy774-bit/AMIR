<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AChat - الدردشات</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --surface: #0E1526;
      --surface-2: #151D2D;
      --text: #EAF2FA;
      --muted: #8B95A7;
      --border-soft: #1F2A3D;
      --cyan: #2FE0FF;
      --cyan-deep: #0891B2;
    }
    body { background: var(--surface); color: var(--text); font-family: 'Cairo', sans-serif; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 100%; max-width: 560px; background: var(--surface); border-left: 1px solid var(--border-soft); display: flex; flex-direction: column; }
    .topbar { padding: 16px 20px; background: var(--surface-2); border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; position: relative; }
    .user-label { font-size: 14px; font-weight: 600; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; position: relative; }
    .menu-btn { width: 36px; height: 36px; border-radius: 8px; background: rgba(47,224,255,.08); border: 1.5px solid rgba(47,224,255,.2); color: var(--text); cursor: pointer; font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: .2s; }
    .menu-btn:hover { background: rgba(47,224,255,.15); border-color: rgba(47,224,255,.4); color: var(--cyan); }
    .logout-btn { padding: 8px 14px; border-radius: 8px; background: transparent; border: 1.5px solid rgba(47,224,255,.2); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 700; transition: .2s; }
    .logout-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    
    .locked-menu { position: absolute; top: 100%; right: 0; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; min-width: 280px; max-height: 400px; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,.65); z-index: 5000; display: none; margin-top: 8px; }
    .locked-menu.show { display: block; }
    .locked-menu-header { padding: 14px 16px; background: rgba(47,224,255,.05); border-bottom: 1px solid var(--border-soft); font-weight: 700; font-size: 13px; color: var(--muted); }
    .locked-menu-list { display: flex; flex-direction: column; }
    .locked-menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: .1s; border-bottom: 1px solid rgba(255,255,255,.03); }
    .locked-menu-item:hover { background: rgba(47,224,255,.08); }
    .locked-menu-item:last-child { border-bottom: none; }
    .locked-menu-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--cyan-deep)); color: #06121C; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; flex-shrink: 0; }
    .locked-menu-name { font-weight: 700; font-size: 13px; color: var(--text); flex: 1; }
    .locked-menu-empty { padding: 20px 16px; text-align: center; color: var(--muted); font-size: 13px; }

    .search-wrap { padding: 12px 16px; }
    .search-wrap input { width: 100%; padding: 10px 14px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border-soft); color: var(--text); outline: none; }
    
    .ctx-menu { position: fixed; z-index: 5100; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; min-width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,.5); display: none; }
    .ctx-menu.show { display: block; }
    .ctx-menu button { display: block; width: 100%; padding: 12px 16px; background: 0; border: 0; color: var(--text); font: inherit; text-align: right; cursor: pointer; transition: .12s; }
    .ctx-menu button:hover { background: rgba(47,224,255,.1); }
    .ctx-menu button + button { border-top: 1px solid var(--border-soft); }
    
    .pin-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; display: none; align-items: center; justify-content: center; }
    .pin-modal.show { display: flex; }
    .pin-box { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 16px; padding: 24px; max-width: 300px; text-align: center; }
    .pin-box h3 { margin-bottom: 12px; font-size: 16px; }
    .pin-box p { margin-bottom: 16px; font-size: 13px; color: var(--muted); }
    .pin-inputs { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
    .pin-input { width: 40px; height: 40px; text-align: center; font-size: 16px; font-weight: 700; border: 1.5px solid var(--border-soft); border-radius: 8px; background: var(--surface-2); color: var(--text); outline: 0; }
    .pin-input:focus { border-color: var(--cyan); }
    .pin-actions { display: flex; gap: 8px; }
    .pin-actions button { flex: 1; padding: 10px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid var(--border-soft); color: var(--text); font: inherit; cursor: pointer; }
    .pin-actions .pin-save { background: linear-gradient(135deg, var(--cyan), var(--cyan-deep)); border: 0; color: #06121C; font-weight: 700; }
    .pin-actions button:hover { border-color: var(--cyan); color: var(--cyan); }

    .locked-section { margin: 0 auto 16px; max-width: 560px; background: rgba(47,224,255,.05); border: 1px solid rgba(47,224,255,.15); border-radius: 12px; padding: 12px 16px; }
    .locked-section.hidden { display: none; }
    .locked-title { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .locked-list { display: flex; flex-direction: column; gap: 6px; }
    .locked-item { display: flex; gap: 10px; align-items: center; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 12px; cursor: pointer; }
    .locked-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--cyan-deep)); color: #06121C; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
    .locked-item .name { font-weight: 700; font-size: 13px; flex: 1; }
    .locked-item .lock { color: var(--cyan); font-size: 12px; }

    .user-card { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); cursor: pointer; display: flex; gap: 12px; align-items: center; transition: .1s; }
    .user-card:hover { background: rgba(47,224,255,.05); }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--cyan-deep)); color: #06121C; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; flex-shrink: 0; }
    .user-info { flex: 1; }
    .name { font-weight: 700; font-size: 14px; }
    .status { font-size: 12px; color: var(--muted); margin-top: 3px; }
    
    .list-wrap { flex: 1; overflow-y: auto; }
    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--surface-2); border: 1px solid var(--cyan); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 13px; z-index: 5000; opacity: 0; transition: opacity .3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="topbar">
        <span class="user-label" id="userLabel">Basmala</span>
        <div class="topbar-actions">
          <button id="lockedMenuBtn" class="menu-btn" title="الدردشات المقفولة">⋮</button>
          <button class="logout-btn" id="logoutBtn">تسجيل الخروج</button>
          <div class="locked-menu" id="lockedMenuDropdown">
            <div class="locked-menu-header">الدردشات المقفولة</div>
            <div class="locked-menu-list" id="lockedMenuList"></div>
            <div class="locked-menu-empty" id="lockedMenuEmpty">لا توجد دردشات مقفولة</div>
          </div>
        </div>
      </div>

      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="دوّري على اسم...">
      </div>

      <div class="ctx-menu" id="ctxMenu">
        <button id="delBtn">X مسح الدردشة</button>
        <button id="lockBtn">■ قفل الدردشة</button>
      </div>

      <div class="pin-modal" id="pinModal">
        <div class="pin-box">
          <h3>قفل الدردشة</h3>
          <p>أدخلي رقم سري (6 أرقام)</p>
          <div class="pin-inputs" id="pinInputs">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
          </div>
          <div class="pin-actions">
            <button id="pinCancel">إلغاء</button>
            <button class="pin-save" id="pinSave" disabled>حفظ</button>
          </div>
        </div>
      </div>

      <div class="pin-modal" id="unlockModal">
        <div class="pin-box">
          <h3>فتح الدردشة</h3>
          <p>أدخلي الرقم السري</p>
          <div class="pin-inputs" id="unlockInputs">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
            <input type="text" class="pin-input" maxlength="1" inputmode="numeric">
          </div>
          <div class="pin-actions">
            <button id="unlockCancel">إلغاء</button>
            <button class="pin-save" id="unlockVerify">تحقق</button>
          </div>
        </div>
      </div>

      <div class="locked-section hidden" id="lockedSection">
        <div class="locked-title">■ الدردشات المقفولة</div>
        <div class="locked-list" id="lockedList"></div>
      </div>

      <div class="list-wrap" id="listWrap"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const KEY = 'achat-locked';
    const pinInputs = document.querySelectorAll('#pinInputs .pin-input');
    const unlockInputs = document.querySelectorAll('#unlockInputs .pin-input');
    
    let targetCard = null;
    let targetLockedId = null;
    let locked = JSON.parse(localStorage.getItem(KEY) || '{}');

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function updateLockedMenu() {
      const list = document.getElementById('lockedMenuList');
      const empty = document.getElementById('lockedMenuEmpty');
      list.innerHTML = '';
      
      if (Object.keys(locked).length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      Object.entries(locked).forEach(([id, {name, avatar}]) => {
        const item = document.createElement('div');
        item.className = 'locked-menu-item';
        item.innerHTML = `<div class="locked-menu-avatar">${avatar}</div><div class="locked-menu-name">${name}</div>`;
        item.onclick = () => openUnlockModal(id);
        item.oncontextmenu = (e) => {
          e.preventDefault();
          showUnlockOptions(id, item);
        };
        list.appendChild(item);
      });
    }

    function showUnlockOptions(id, element) {
      const menu = document.createElement('div');
      menu.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;min-width:160px;box-shadow:0 10px 30px rgba(0,0,0,.65);z-index:5001;';
      const rect = element.getBoundingClientRect();
      menu.style.top = (rect.bottom + 5) + 'px';
      menu.style.left = (rect.left - 140) + 'px';
      menu.innerHTML = `
        <button style="display:block;width:100%;padding:12px 16px;background:0;border:0;color:var(--text);font:inherit;text-align:right;cursor:pointer;">فتح</button>
        <button style="display:block;width:100%;padding:12px 16px;background:0;border:0;color:#FF5D75;font:inherit;text-align:right;cursor:pointer;border-top:1px solid var(--border-soft);">حذف</button>
      `;
      menu.querySelectorAll('button')[0].onclick = () => {
        openUnlockModal(id);
        menu.remove();
      };
      menu.querySelectorAll('button')[1].onclick = () => {
        delete locked[id];
        localStorage.setItem(KEY, JSON.stringify(locked));
        updateLockedMenu();
        showToast('تم الحذف');
        menu.remove();
      };
      document.body.appendChild(menu);
      setTimeout(() => document.addEventListener('click', () => menu.remove(), {once: true}), 0);
    }

    function openUnlockModal(id) {
      targetLockedId = id;
      unlockInputs.forEach((inp, i) => {
        inp.value = '';
        if (i === 0) inp.focus();
      });
      document.getElementById('unlockModal').classList.add('show');
    }

    function showContextMenu(card) {
      targetCard = card;
      const menu = document.getElementById('ctxMenu');
      const rect = card.getBoundingClientRect();
      menu.style.top = (rect.bottom + 8) + 'px';
      menu.style.left = Math.max(8, rect.left - 100) + 'px';
      menu.classList.add('show');
    }

    function setupLongPress() {
      document.querySelectorAll('.user-card').forEach(card => {
        card.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(card); };
        let timer;
        card.onmousedown = () => { timer = setTimeout(() => showContextMenu(card), 500); };
        card.onmouseup = card.onmouseleave = () => clearTimeout(timer);
      });
    }

    document.getElementById('lockedMenuBtn').onclick = (e) => {
      e.stopPropagation();
      const menu = document.getElementById('lockedMenuDropdown');
      menu.classList.toggle('show');
      updateLockedMenu();
    };

    document.onclick = (e) => {
      const menu = document.getElementById('lockedMenuDropdown');
      if (!menu.contains(e.target) && e.target.id !== 'lockedMenuBtn') {
        menu.classList.remove('show');
      }
      const ctx = document.getElementById('ctxMenu');
      if (!ctx.contains(e.target)) ctx.classList.remove('show');
    };

    document.getElementById('delBtn').onclick = () => {
      if (targetCard) {
        targetCard.remove();
        document.getElementById('ctxMenu').classList.remove('show');
        showToast('تم الحذف');
      }
    };

    document.getElementById('lockBtn').onclick = () => {
      document.getElementById('ctxMenu').classList.remove('show');
      pinInputs.forEach((inp, i) => {
        inp.value = '';
        if (i === 0) inp.focus();
        inp.oninput = () => {
          if (inp.value && inp.nextElementSibling) inp.nextElementSibling.focus();
          document.getElementById('pinSave').disabled = !Array.from(pinInputs).every(x => x.value);
        };
      });
      document.getElementById('pinSave').disabled = true;
      document.getElementById('pinModal').classList.add('show');
    };

    document.getElementById('pinCancel').onclick = () => {
      document.getElementById('pinModal').classList.remove('show');
    };

    document.getElementById('pinSave').onclick = () => {
      const pin = Array.from(pinInputs).map(i => i.value).join('');
      if (pin.length !== 6) {
        showToast('أدخلي 6 أرقام');
        return;
      }
      const name = targetCard.querySelector('.name').textContent;
      const avatar = targetCard.querySelector('.avatar').textContent;
      locked['lock_' + Date.now()] = {name, avatar, pin};
      localStorage.setItem(KEY, JSON.stringify(locked));
      targetCard.remove();
      document.getElementById('pinModal').classList.remove('show');
      updateLockedMenu();
      showToast('تم القفل');
    };

    document.getElementById('unlockCancel').onclick = () => {
      document.getElementById('unlockModal').classList.remove('show');
    };

    document.getElementById('unlockVerify').onclick = () => {
      const entered = Array.from(unlockInputs).map(i => i.value).join('');
      if (entered === locked[targetLockedId]?.pin) {
        showToast('تم الفتح: ' + locked[targetLockedId].name);
        document.getElementById('unlockModal').classList.remove('show');
      } else {
        showToast('الرقم خاطئ');
      }
    };

    // Demo
    ['Farha', 'Coding', 'Jana', 'يسملح', 'Gana'].forEach(name => {
      const card = document.createElement('div');
      card.className = 'user-card';
      card.innerHTML = `
        <div class="avatar">${name[0]}</div>
        <div class="user-info">
          <div class="name">${name}</div>
          <div class="status">رسالة</div>
        </div>
      `;
      document.getElementById('listWrap').appendChild(card);
    });

    setupLongPress();
    updateLockedMenu();
  </script>
</body>
</html>
