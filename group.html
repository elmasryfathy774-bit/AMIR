<title>AChat | مجموعة</title>

<style>
:root{
  --void:#070B14;
  --surface:#0E1526;
  --surface-2:#131B2F;
  --border-soft:rgba(255,255,255,.08);
  --cyan:#2FE0FF;
  --cyan-deep:#1A4FD1;
  --text:#EAF2FA;
  --muted:#7C8AA3;
  --bubble-out:linear-gradient(135deg,#1A4FD1,#1565C0);
  --bubble-in:#131B2F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Cairo',sans-serif;
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(circle at 18% 12%,rgba(47,224,255,.08),transparent 38%),
    radial-gradient(circle at 88% 85%,rgba(26,79,209,.12),transparent 42%),
    var(--void);
  overflow:hidden;
}

/* ===== TOPBAR ===== */
.topbar{
  background:rgba(14,21,38,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border-soft);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  z-index:10;
}
.back-btn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;
  border:none;
  color:var(--cyan);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  flex-shrink:0;
}
.back-btn:hover{background:rgba(47,224,255,.1);}
.group-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;color:#06121C;
  overflow:hidden;flex-shrink:0;cursor:pointer;
}
.group-avatar img{width:100%;height:100%;object-fit:cover;}
.group-info{flex:1;min-width:0;cursor:pointer;}
.group-info h2{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-info p{font-size:12px;color:var(--muted);}
.topbar-actions{display:flex;gap:4px;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}

/* ===== MESSAGES AREA ===== */
.messages-area{
  flex:1;
  overflow-y:auto;
  padding:16px 12px;
  display:flex;
  flex-direction:column;
  gap:4px;
  scroll-behavior:smooth;
}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

/* date divider */
.date-divider{
  text-align:center;
  margin:10px 0;
}
.date-divider span{
  background:rgba(255,255,255,.06);
  border:1px solid var(--border-soft);
  border-radius:20px;
  padding:3px 12px;
  font-size:11.5px;
  color:var(--muted);
}

/* system message */
.sys-msg{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin:6px 0;
  background:rgba(255,255,255,.04);
  border-radius:20px;
  padding:4px 14px;
  width:fit-content;
  align-self:center;
}

/* bubbles */
.msg-row{
  display:flex;
  align-items:flex-end;
  gap:8px;
  max-width:80%;
}
.msg-row.out{
  align-self:flex-start;
  flex-direction:row-reverse;
}
.msg-row.in{
  align-self:flex-end;
}
.msg-row .sender-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
  color:#06121C;font-weight:800;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
  margin-bottom:2px;
}
.msg-row .sender-avatar img{width:100%;height:100%;object-fit:cover;}
.bubble{
  padding:8px 12px 6px;
  border-radius:18px;
  max-width:100%;
  word-break:break-word;
  position:relative;
}
.msg-row.out .bubble{
  background:var(--bubble-out);
  border-bottom-left-radius:5px;
}
.msg-row.in .bubble{
  background:var(--bubble-in);
  border:1px solid var(--border-soft);
  border-bottom-right-radius:5px;
}
.bubble .sender-name{
  font-size:11.5px;
  font-weight:700;
  color:var(--cyan);
  margin-bottom:2px;
}
.msg-row.out .bubble .sender-name{display:none;}
.bubble .msg-text{font-size:14px;line-height:1.5;}
.bubble .msg-image{
  max-width:220px;width:100%;
  border-radius:12px;
  margin-bottom:4px;
  cursor:pointer;
  display:block;
}
.bubble .msg-meta{
  display:flex;align-items:center;gap:4px;
  justify-content:flex-end;
  margin-top:3px;
}
.bubble .msg-time{font-size:11px;color:rgba(234,242,250,.45);}
.msg-row.out .bubble .msg-time{color:rgba(255,255,255,.55);}
.tick{font-size:12px;color:rgba(255,255,255,.6);}
.tick.read{color:var(--cyan);}

/* ===== INPUT BAR ===== */
.input-bar{
  background:rgba(14,21,38,.95);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border-soft);
  padding:10px 12px;
  display:flex;
  align-items:flex-end;
  gap:8px;
  flex-shrink:0;
}
.attach-btn,.send-btn,.emoji-btn{
  width:42px;height:42px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:18px;
}
.emoji-btn{background:transparent;color:var(--muted);}
.emoji-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
.attach-btn{background:transparent;color:var(--muted);}
.attach-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
.send-btn{
  background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
  color:#06121C;
}
.send-btn:hover{filter:brightness(1.1);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.msg-input-wrap{
  flex:1;
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  border-radius:22px;
  padding:10px 14px;
  min-height:42px;
  max-height:120px;
  overflow-y:auto;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  color:var(--text);
  outline:none;
  line-height:1.5;
  white-space:pre-wrap;
}
.msg-input-wrap:empty::before{
  content:attr(data-placeholder);
  color:var(--muted);
  pointer-events:none;
}
.msg-input-wrap::-webkit-scrollbar{width:3px;}

/* ===== readonly notice ===== */
.readonly-bar{
  text-align:center;
  padding:10px;
  font-size:13px;
  color:var(--muted);
  background:rgba(14,21,38,.9);
  border-top:1px solid var(--border-soft);
  flex-shrink:0;
}

/* ===== GROUP INFO MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(5,8,16,.75);
  backdrop-filter:blur(4px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
}
.modal-overlay.show{display:flex;}
.info-sheet{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:26px 26px 0 0;
  width:100%;
  max-width:560px;
  max-height:85vh;
  overflow-y:auto;
  padding:0 0 30px;
}
.info-sheet::-webkit-scrollbar{width:3px;}
.info-cover{
  width:100%;
  height:160px;
  background:linear-gradient(160deg,#0B1020,#0E1B2E);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  border-radius:26px 26px 0 0;
  overflow:hidden;
}
.info-cover-avatar{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
  color:#06121C;font-weight:800;font-size:32px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  border:3px solid rgba(47,224,255,.3);
}
.info-cover-avatar img{width:100%;height:100%;object-fit:cover;}
.info-close{
  position:absolute;top:14px;left:14px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.4);border:none;
  color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.info-body{padding:20px 20px 0;}
.info-name{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;}
.info-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;}
.info-section-title{font-size:12px;color:var(--cyan);font-weight:700;margin-bottom:10px;letter-spacing:.5px;}
.member-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border-soft);
}
.member-row:last-child{border-bottom:none;}
.member-av{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
  color:#06121C;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.member-av img{width:100%;height:100%;object-fit:cover;}
.member-label{flex:1;}
.member-label .mn{font-size:14px;font-weight:700;}
.member-label .ms{font-size:12px;color:var(--muted);}
.admin-badge{
  font-size:11px;font-weight:700;
  background:rgba(47,224,255,.12);
  color:var(--cyan);
  border:1px solid rgba(47,224,255,.25);
  border-radius:20px;
  padding:2px 8px;
}
.remove-member-btn{
  background:rgba(255,93,117,.12);
  border:1px solid rgba(255,93,117,.3);
  color:#FF5D75;
  border-radius:50%;
  width:28px;height:28px;
  font-size:13px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.remove-member-btn:hover{background:rgba(255,93,117,.25);}

/* ===== image lightbox ===== */
.lightbox{
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}
.lightbox.show{display:flex;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:10px;}
.lightbox-close{
  position:absolute;top:18px;left:18px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* toast */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(20,30,55,.97);
  border:1px solid var(--border-soft);
  color:var(--text);border-radius:24px;
  padding:10px 22px;font-size:13.5px;font-weight:600;
  opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:300;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* loading */
.loading-msgs{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:40px;color:var(--muted);font-size:14px;
}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:3px solid rgba(47,224,255,.2);
  border-top-color:var(--cyan);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="back-btn" id="backBtn" title="رجوع">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="group-avatar" id="topAvatar"></div>
  <div class="group-info" id="topInfo">
    <h2 id="topName">مجموعة</h2>
    <p id="topMembers">جاري التحميل...</p>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="infoBtn" title="معلومات المجموعة">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </button>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages-area" id="messagesArea">
  <div class="loading-msgs" id="loadingMsgs">
    <div class="spinner"></div>
    <span>جاري تحميل الرسائل...</span>
  </div>
</div>

<!-- INPUT BAR -->
<div class="input-bar" id="inputBar">
  <button class="attach-btn" id="attachBtn" title="إرفاق صورة">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="file" id="imageInput" accept="image/*" hidden>
  <div class="msg-input-wrap" id="msgInput" contenteditable="true" data-placeholder="اكتب رسالة..."></div>
  <button class="send-btn" id="sendBtn" title="إرسال">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- readonly bar (hidden by default) -->
<div class="readonly-bar" id="readonlyBar" style="display:none;">🔒 الكتابة متاحة للأدمن فقط</div>

<!-- GROUP INFO MODAL -->
<div class="modal-overlay" id="infoModal">
  <div class="info-sheet">
    <div class="info-cover">
      <button class="info-close" id="infoClose">✕</button>
      <div class="info-cover-avatar" id="infoAvatar"></div>
    </div>
    <div class="info-body">
      <div class="info-name" id="infoName"></div>
      <div class="info-sub" id="infoSub"></div>
      <div class="info-section-title">الأعضاء</div>
      <div id="membersList"></div>
    </div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  doc, getDoc, collection, addDoc, onSnapshot,
  query, orderBy, serverTimestamp, updateDoc, getDocs, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getStorage, ref, uploadString, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

// ===== URL params =====
const params = new URLSearchParams(location.search);
const groupId = params.get('groupId');
const groupNameParam = decodeURIComponent(params.get('name') || 'مجموعة');

if(!groupId){ location.href = 'chat.html'; }

// ===== elements =====
const topAvatar    = document.getElementById('topAvatar');
const topName      = document.getElementById('topName');
const topMembers   = document.getElementById('topMembers');
const messagesArea = document.getElementById('messagesArea');
const loadingMsgs  = document.getElementById('loadingMsgs');
const inputBar     = document.getElementById('inputBar');
const readonlyBar  = document.getElementById('readonlyBar');
const msgInput     = document.getElementById('msgInput');
const sendBtn      = document.getElementById('sendBtn');
const attachBtn    = document.getElementById('attachBtn');
const imageInput   = document.getElementById('imageInput');
const infoBtn      = document.getElementById('infoBtn');
const infoModal    = document.getElementById('infoModal');
const infoClose    = document.getElementById('infoClose');
const infoAvatar   = document.getElementById('infoAvatar');
const infoName     = document.getElementById('infoName');
const infoSub      = document.getElementById('infoSub');
const membersList  = document.getElementById('membersList');
const backBtn      = document.getElementById('backBtn');
const lightbox     = document.getElementById('lightbox');
const lightboxImg  = document.getElementById('lightboxImg');
const lightboxClose= document.getElementById('lightboxClose');
const toastEl      = document.getElementById('toast');

let currentUser = null;
let groupData   = null;
let membersData = {};
let unsubMsgs   = null;
let toastTimer  = null;

// ===== toast =====
function showToast(msg){
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 3000);
}

// ===== back =====
backBtn.addEventListener('click', ()=>{ location.href = 'chat.html'; });

// ===== info modal =====
infoBtn.addEventListener('click', openInfo);
document.getElementById('topInfo').addEventListener('click', openInfo);
document.getElementById('topAvatar').addEventListener('click', openInfo);
infoClose.addEventListener('click', ()=>infoModal.classList.remove('show'));
infoModal.addEventListener('click', e=>{ if(e.target===infoModal) infoModal.classList.remove('show'); });

function openInfo(){
  if(!groupData) return;
  location.href = `group-info.html?groupId=${groupId}&name=${encodeURIComponent(groupData.name||groupNameParam)}`;
}

function renderInfo(){
  // avatar
  infoAvatar.innerHTML = groupData.photoURL
    ? `<img src="${groupData.photoURL}" alt="">`
    : (groupData.name||'م').charAt(0).toUpperCase();
  infoName.textContent = groupData.name || groupNameParam;
  infoSub.textContent  = `${groupData.members?.length || 0} أعضاء • ${groupData.allowWrite===false?'الكتابة للأدمن فقط':'الكل يقدر يكتب'}`;
  // members
  membersList.innerHTML = '';
  (groupData.members||[]).forEach(uid => {
    const u = membersData[uid];
    const name = u?.displayName || u?.name || u?.fullName || u?.username || u?.email || 'مستخدم';
    const isAdmin = uid === groupData.adminUid;
    const row = document.createElement('div');
    row.className = 'member-row';
    const isMe = uid === currentUser?.uid;
    const iAmAdmin = groupData.adminUid === currentUser?.uid;
    const canRemove = iAmAdmin && !isMe && !isAdmin;
    row.innerHTML = `
      <div class="member-av">${u?.photoURL?`<img src="${u.photoURL}" alt="">`:(name.charAt(0).toUpperCase())}</div>
      <div class="member-label">
        <div class="mn">${name}${isMe?' (أنت)':''}</div>
        <div class="ms">${u?.isOnline?'🟢 متصل':'⚪ غير متصل'}</div>
      </div>
      ${isAdmin?'<span class="admin-badge">أدمن</span>':''}
      ${canRemove?`<button class="remove-member-btn" data-uid="${uid}" title="إزالة من المجموعة">✕</button>`:''}
    `;
    membersList.appendChild(row);
  });
}

// ===== lightbox =====
lightboxClose.addEventListener('click', ()=>lightbox.classList.remove('show'));
lightbox.addEventListener('click', e=>{ if(e.target===lightbox) lightbox.classList.remove('show'); });

function openLightbox(src){
  lightboxImg.src = src;
  lightbox.classList.add('show');
}

// ===== render avatar helper =====
function renderAvatar(el, name, photoURL){
  el.innerHTML = photoURL ? `<img src="${photoURL}" alt="${name}">` : name.charAt(0).toUpperCase();
}

// ===== format time =====
function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'اليوم';
  if(d.toDateString()===yesterday.toDateString()) return 'الأمس';
  return d.toLocaleDateString('ar-EG',{day:'numeric',month:'long',year:'numeric'});
}

// ===== render messages =====
let lastDateLabel = '';
function renderMessages(msgs){
  messagesArea.innerHTML = '';
  lastDateLabel = '';
  const isAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight < 80;

  msgs.forEach(m => {
    // date divider
    const dateLabel = fmtDate(m.createdAt);
    if(dateLabel && dateLabel !== lastDateLabel){
      lastDateLabel = dateLabel;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${dateLabel}</span>`;
      messagesArea.appendChild(div);
    }

    // system messages
    if(m.type === 'system'){
      const s = document.createElement('div');
      s.className = 'sys-msg';
      s.textContent = m.text;
      messagesArea.appendChild(s);
      return;
    }

    const isOut = m.senderId === currentUser?.uid;
    const sender = membersData[m.senderId] || {};
    const senderName = sender.displayName || sender.name || sender.fullName || sender.username || sender.email || 'مستخدم';

    const row = document.createElement('div');
    row.className = `msg-row ${isOut?'out':'in'}`;

    // avatar (only for incoming)
    if(!isOut){
      const av = document.createElement('div');
      av.className = 'sender-avatar';
      av.innerHTML = sender.photoURL ? `<img src="${sender.photoURL}" alt="">` : senderName.charAt(0).toUpperCase();
      row.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    let inner = '';
    if(!isOut) inner += `<div class="sender-name">${senderName}</div>`;
    if(m.imageURL) inner += `<img class="msg-image" src="${m.imageURL}" alt="صورة">`;
    if(m.text) inner += `<div class="msg-text">${m.text.replace(/\n/g,'<br>')}</div>`;
    inner += `<div class="msg-meta"><span class="msg-time">${fmtTime(m.createdAt)}</span>${isOut?`<span class="tick ${m.readBy&&m.readBy.length>1?'read':''}">✓✓</span>`:''}</div>`;
    bubble.innerHTML = inner;

    // image click
    bubble.querySelectorAll('.msg-image').forEach(img=>{
      img.addEventListener('click', ()=>openLightbox(img.src));
    });

    row.appendChild(bubble);
    messagesArea.appendChild(row);
  });

  // scroll to bottom
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

// ===== send message =====
async function sendMessage(text, imageURL){
  if(!currentUser || !groupId) return;
  try{
    await addDoc(collection(db,'groups',groupId,'messages'),{
      text: text||'',
      imageURL: imageURL||null,
      senderId: currentUser.uid,
      senderName: (membersData[currentUser.uid]?.displayName || membersData[currentUser.uid]?.name || membersData[currentUser.uid]?.fullName || membersData[currentUser.uid]?.username || currentUser.displayName || currentUser.email),
      createdAt: serverTimestamp(),
      readBy: [currentUser.uid]
    });
    // update lastMessage on group doc
    await updateDoc(doc(db,'groups',groupId),{
      lastMessage: imageURL ? '📷 صورة' : text,
      updatedAt: serverTimestamp()
    });
  } catch(e){
    showToast('تعذر إرسال الرسالة');
  }
}

// send button
sendBtn.addEventListener('click', async ()=>{
  const text = msgInput.innerText.trim();
  if(!text) return;
  msgInput.innerText = '';
  await sendMessage(text, null);
});

// enter key
msgInput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendBtn.click();
  }
});

// attach image
attachBtn.addEventListener('click', ()=>imageInput.click());
imageInput.addEventListener('change', async ()=>{
  const file = imageInput.files[0];
  imageInput.value='';
  if(!file) return;
  showToast('جاري رفع الصورة...');
  try{
    const reader = new FileReader();
    reader.onload = async ()=>{
      // compress
      const img = new Image();
      img.onload = async ()=>{
        const max = 900;
        let w=img.width, h=img.height;
        if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg',0.8);
        try{
          const storage = getStorage();
          const storageRef = ref(storage,`groups/${groupId}/${Date.now()}.jpg`);
          await uploadString(storageRef, dataUrl, 'data_url');
          const url = await getDownloadURL(storageRef);
          await sendMessage('', url);
        } catch(e){
          // fallback: send base64 directly (works if storage not configured)
          await sendMessage('', dataUrl);
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  } catch(e){ showToast('تعذر إرسال الصورة'); }
});

// ===== MAIN INIT =====
onAuthStateChanged(auth, async user=>{
  if(!user){ location.href='index.html'; return; }
  currentUser = user;

  // load group data
  try{
    const gSnap = await getDoc(doc(db,'groups',groupId));
    if(!gSnap.exists()){ showToast('المجموعة غير موجودة'); setTimeout(()=>location.href='chat.html',1500); return; }
    groupData = { id: gSnap.id, ...gSnap.data() };
  } catch(e){ showToast('تعذر تحميل المجموعة'); return; }

  // check membership
  if(groupData.members && !groupData.members.includes(currentUser.uid)){
    showToast('لست عضواً في هذه المجموعة');
    setTimeout(()=>location.href='chat.html',1500);
    return;
  }

  // load members data
  try{
    const promises = (groupData.members||[]).map(uid=>getDoc(doc(db,'users',uid)));
    const snaps = await Promise.all(promises);
    snaps.forEach(s=>{ if(s.exists()) membersData[s.id]=s.data(); });
    // ensure current user data is loaded even if not in members list
    if(!membersData[currentUser.uid]){
      const mySnap = await getDoc(doc(db,'users',currentUser.uid));
      if(mySnap.exists()) membersData[currentUser.uid] = mySnap.data();
    }
  } catch(e){ /* ignore */ }

  // render topbar
  topName.textContent = groupData.name || groupNameParam;
  document.title = `AChat | ${groupData.name||groupNameParam}`;
  const memberCount = groupData.members?.length || 0;
  topMembers.textContent = `${memberCount} أعضاء`;
  renderAvatar(topAvatar, groupData.name||'م', groupData.photoURL);

  // check allowWrite
  const canWrite = groupData.allowWrite !== false || groupData.adminUid === currentUser.uid;
  if(!canWrite){
    inputBar.style.display = 'none';
    readonlyBar.style.display = 'block';
  }

  // listen to messages
  loadingMsgs.style.display='flex';
  const msgsQuery = query(collection(db,'groups',groupId,'messages'), orderBy('createdAt','asc'));
  unsubMsgs = onSnapshot(msgsQuery, snap=>{
    loadingMsgs.style.display='none';
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderMessages(msgs);
  }, err=>{
    loadingMsgs.style.display='none';
    showToast('تعذر تحميل الرسائل');
  });
});
</script>
