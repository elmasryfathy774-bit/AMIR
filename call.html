<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
    --danger:#FF5D75;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    background:
      radial-gradient(circle at 22% 18%, rgba(47,224,255,.14), transparent 42%),
      radial-gradient(circle at 85% 80%, rgba(26,79,209,.18), transparent 46%),
      var(--void);
    overflow:hidden;
    padding:36px 24px 32px;
    text-align:center;
  }

  .call-top{ width:100%; }
  .call-state{
    font-size:13.5px;
    color:var(--muted);
    font-weight:600;
    letter-spacing:.3px;
    margin-bottom:6px;
    min-height:18px;
  }
  .call-timer{
    font-size:13.5px;
    color:var(--cyan);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    display:none;
  }
  .call-timer.show{ display:inline-block; }

  .call-mid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .peer-avatar{
    width:128px; height:128px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:46px;
    overflow:hidden;
    box-shadow:0 0 0 1px var(--border-soft), 0 30px 70px -20px rgba(47,224,255,.35);
    position:relative;
  }
  .peer-avatar img{ width:100%; height:100%; object-fit:cover; }
  .peer-avatar::after{
    content:"";
    position:absolute; inset:-10px;
    border-radius:50%;
    border:1.5px solid rgba(47,224,255,.35);
    animation:ringPulse 1.8s ease-out infinite;
  }
  .peer-avatar.connected::after{ display:none; }
  @keyframes ringPulse{
    0%{ transform:scale(.94); opacity:.9; }
    80%{ transform:scale(1.18); opacity:0; }
    100%{ opacity:0; }
  }
  .peer-name{ font-size:21px; font-weight:800; }
  .peer-sub{ font-size:13.5px; color:var(--muted); }

  .call-actions{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:24px;
    padding:16px 0;
    animation:slideUp .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp{
    from{ transform:translateY(20px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .call-btn{
    width:58px; height:58px;
    border-radius:50%;
    border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:23px;
    cursor:pointer;
    transition:all .18s cubic-bezier(0.34, 1.56, 0.64, 1);
    flex-shrink:0;
    font-weight:600;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .call-btn:hover{ 
    transform:scale(1.08);
    box-shadow:0 6px 16px rgba(0,0,0,.22);
  }
  .call-btn:active{ 
    transform:scale(.95);
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  
  .call-btn.mute{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
  }
  .call-btn.mute:hover{
    background:rgba(255,255,255,.15);
    border-color:rgba(255,255,255,.25);
  }
  .call-btn.mute.active{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.speaker{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
  }
  .call-btn.speaker:hover{
    background:rgba(255,255,255,.15);
    border-color:rgba(255,255,255,.25);
  }
  .call-btn.speaker.active{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.invite{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
    font-size:22px;
  }
  .call-btn.invite:hover{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.end{
    width:66px; height:66px;
    background:linear-gradient(135deg, var(--danger), #C73B54);
    color:#fff;
    font-size:26px;
    box-shadow:0 8px 20px -8px rgba(255,93,117,.5);
    border:none;
  }
  .call-btn.end:hover{
    transform:scale(1.06);
    box-shadow:0 10px 26px -6px rgba(255,93,117,.65);
  }
  
  .call-btn.accept{
    width:66px; height:66px;
    background:linear-gradient(135deg, #2FE08A, #17B66E);
    color:#06121C;
    font-size:26px;
    box-shadow:0 8px 20px -8px rgba(47,224,138,.5);
    animation:acceptPulse 1.4s ease-in-out infinite;
    border:none;
  }
  .call-btn.accept:hover{
    filter:brightness(1.12);
    box-shadow:0 10px 28px -6px rgba(47,224,138,.65);
  }
  
  @keyframes acceptPulse{
    0%,100%{ box-shadow:0 8px 20px -8px rgba(47,224,138,.5); }
    50%{ box-shadow:0 10px 30px -4px rgba(47,224,138,.7); }
  }

  /* ===== Group Call Modal ===== */
  .modal-overlay-group{
    position:fixed; inset:0;
    background:rgba(5,8,16,.8);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }
  .modal-overlay-group.show{ display:flex; }
  .modal-box-group{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:22px;
    padding:26px 24px;
    max-width:380px;
    width:100%;
    box-shadow:0 30px 70px -25px rgba(0,0,0,.7);
    max-height:70vh;
    overflow-y:auto;
  }
  .modal-box-group h2{
    font-size:17px;
    font-weight:800;
    margin-bottom:18px;
    text-align:center;
  }
  .friends-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:20px;
  }
  .friend-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 12px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--border-soft);
    border-radius:12px;
    cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .friend-item:hover{
    background:rgba(255,255,255,.08);
    border-color:var(--cyan);
  }
  .friend-item input[type="checkbox"]{
    width:20px;
    height:20px;
    cursor:pointer;
    accent-color:var(--cyan);
    flex-shrink:0;
  }
  .friend-info{
    flex:1;
    min-width:0;
    text-align:right;
  }
  .friend-name{
    font-weight:600;
    font-size:14px;
    margin-bottom:2px;
  }
  .friend-email{
    font-size:12px;
    color:var(--muted);
  }
  .modal-actions{
    display:flex;
    gap:10px;
  }
  .modal-actions button{
    flex:1;
    padding:12px;
    border-radius:11px;
    border:1px solid var(--border-soft);
    background:rgba(255,255,255,.05);
    color:var(--text);
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .modal-actions button:hover{
    background:rgba(255,255,255,.08);
    border-color:var(--cyan);
  }
  .modal-actions button.start-btn{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    border:none;
    color:#06121C;
  }
  .modal-actions button.start-btn:hover{
    background:linear-gradient(135deg, #1AC0FF, #0E7FA0);
  }
  .modal-actions button.start-btn:disabled{
    opacity:.5;
    cursor:not-allowed;
  }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <div class="call-top">
    <div class="call-state" id="callState">جاري الاتصال...</div>
    <div class="call-timer" id="callTimer">00:00</div>
  </div>

  <div class="call-mid">
    <div class="peer-avatar" id="peerAvatar">؟</div>
    <div>
      <div class="peer-name" id="peerName">...</div>
      <div class="peer-sub" id="peerSub">مكالمة صوتية</div>
    </div>
  </div>

  <div class="call-actions" id="ringingCalleeActions">
    <button type="button" class="call-btn end" id="rejectBtn" title="رفض">✕</button>
    <button type="button" class="call-btn accept" id="acceptBtn" title="قبول">📞</button>
  </div>

  <div class="call-actions hidden" id="activeActions">
    <button type="button" class="call-btn mute" id="muteBtn" title="كتم الصوت">🎤</button>
    <button type="button" class="call-btn speaker" id="speakerBtn" title="مكبر الصوت">🔊</button>
    <button type="button" class="call-btn invite" id="inviteBtn" title="إضافة أشخاص">➕</button>
    <button type="button" class="call-btn end" id="endBtn" title="إنهاء المكالمة">📞</button>
  </div>

  <!-- Group Call Modal -->
  <div class="modal-overlay-group" id="groupCallModal">
    <div class="modal-box-group">
      <h2>اختر الأصدقاء</h2>
      <div class="friends-list" id="friendsList"></div>
      <div class="modal-actions">
        <button type="button" id="cancelGroupBtn">إلغاء</button>
        <button type="button" class="start-btn" id="startGroupBtn" disabled>بدء المكالمة</button>
      </div>
    </div>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    doc, getDoc, setDoc, updateDoc, onSnapshot, deleteDoc,
    collection, addDoc, query, onSnapshot as onSnapshotSub, serverTimestamp, deleteField, getDocs
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const chatId = params.get('chatId');
  const peerUid = params.get('uid');
  const peerName = params.get('name') || 'المستخدم';
  const role = params.get('role') === 'callee' ? 'callee' : 'caller'; // caller = اللي بدأ المكالمة

  if(!chatId || !peerUid){
    window.location.href = 'chat.html';
  }

  document.getElementById('peerName').textContent = peerName;
  const peerAvatarEl = document.getElementById('peerAvatar');
  peerAvatarEl.textContent = peerName.charAt(0).toUpperCase();
  getDoc(doc(db, 'users', peerUid)).then(snap => {
    if(snap.exists() && snap.data().photoURL){
      peerAvatarEl.innerHTML = `<img src="${snap.data().photoURL}" alt="${peerName}">`;
    }
  }).catch(() => {});

  const callStateEl = document.getElementById('callState');
  const callTimerEl = document.getElementById('callTimer');
  const ringingCalleeActions = document.getElementById('ringingCalleeActions');
  const activeActions = document.getElementById('activeActions');
  const acceptBtn = document.getElementById('acceptBtn');
  const rejectBtn = document.getElementById('rejectBtn');
  const endBtn = document.getElementById('endBtn');
  const muteBtn = document.getElementById('muteBtn');
  const speakerBtn = document.getElementById('speakerBtn');
  const remoteAudio = document.getElementById('remoteAudio');

  // الوضع الافتراضي: لو إنتِ اللي بدأتِ المكالمة، الأزرار اللي تتظهر هي "إنهاء" بس فورًا
  if(role === 'caller'){
    ringingCalleeActions.classList.add('hidden');
    activeActions.classList.remove('hidden');
    // إخفاء أزرار الكتم والسماعة وإضافة أشخاص لحد ما المكالمة تتوصل فعليًا
    muteBtn.classList.add('hidden');
    speakerBtn.classList.add('hidden');
    inviteBtn.classList.add('hidden');
  } else {
    // المستقبل: يظهرله أزرار الرد/الرفض فقط في البداية
    ringingCalleeActions.classList.remove('hidden');
    activeActions.classList.add('hidden');
  }

  let currentUser = null;
  let pc = null;
  let localStream = null;
  let callDocRef = null;
  let unsubCallDoc = null;
  let unsubCandidates = null;
  let timerInterval = null;
  let callEnded = false;
  let isMuted = false;
  let pendingCandidates = []; // ICE candidates توصل قبل ما remoteDescription يتظبط، بنأجلها هنا
  let callSeconds = 0;       // مدة المكالمة الفعلية بعد ما اتوصلت
  let wasConnected = false;  // هل المكالمة اتوصلت فعلاً ولو لحظة
  let callLogWritten = false; // عشان منكتبش رسالة المكالمة في الشات أكتر من مرة

  // STUN + TURN servers موثوقة ومجانية
  // استخدمنا metered.ca (مجاني بدون API key)  + فريسيلا الخاصة بـ Cloudflare
  const ICE_SERVERS = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'stun:stun3.l.google.com:19302' },
      { urls: 'stun:stun4.l.google.com:19302' },
      // TURN مجاني من metered.ca — ضروري لأجهزة على شبكات مختلفة
      { urls: 'turn:a.relay.metered.ca:80',     username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:a.relay.metered.ca:80?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:a.relay.metered.ca:443',    username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
      // TURN إضافي - بيساعد على شبكات مختلفة
      { urls: 'turn:numb.viagenie.ca', username: 'webrtc@live.com', credential: 'muazkh' },
      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ],
    iceCandidatePoolSize: 10
  };

  // ====================================================
  // ضغط الصور قبل الرفع (Canvas API)
  // ====================================================
  async function compressImage(file, maxWidth = 800, quality = 0.7){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          if(width > maxWidth){
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          canvas.toBlob(blob => {
            console.log(`[v0] Image compressed: ${(file.size / 1024).toFixed(2)}KB → ${(blob.size / 1024).toFixed(2)}KB`);
            resolve(blob);
          }, 'image/jpeg', quality);
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = event.target.result;
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  }

  onAuthStateChanged(auth, (user) => {
    if(!user){ window.location.href = 'index.html'; return; }
    currentUser = user;
    callDocRef = doc(db, 'calls', chatId);
    if(role === 'caller') startAsCaller();
    else startAsCallee();
  });

  // ====================================================
  // الطرف اللي بدأ المكالمة
  // ====================================================
  async function startAsCaller(){
    // اجيب اسمي الحقيقي من Firestore عشان displayName ممكن يكون null
    let myName = currentUser.displayName || '';
    if(!myName){
      try{
        const mySnap = await getDoc(doc(db, 'users', currentUser.uid));
        if(mySnap.exists()) myName = mySnap.data().name || mySnap.data().displayName || '';
      } catch(e){}
    }
    if(!myName) myName = currentUser.email ? currentUser.email.split('@')[0] : 'مستخدم';

    try{
      localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    } catch(e){
      callStateEl.textContent = 'محتاجة صلاحية الميكروفون';
      setTimeout(() => window.close() || (window.location.href = `room.html?${params.toString()}`), 1800);
      return;
    }

    pc = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    attachPcHandlers();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(callDocRef, {
      callerUid: currentUser.uid,
      calleeUid: peerUid,
      callerName: myName,
      status: 'ringing',
      offer: { type: offer.type, sdp: offer.sdp },
      createdAt: serverTimestamp()
    });

    callStateEl.textContent = 'بيرن...';
    listenToCallDoc();
    listenToCandidates('answerCandidates');

    // مهلة عدم رد
    setTimeout(() => {
      if(!callEnded && !wasConnected){
        endCall('no_answer');
      }
    }, 40000);
  }

  // ====================================================
  // الطرف اللي بيستقبل المكالمة
  // ====================================================
  async function startAsCallee(){
    const snap = await getDoc(callDocRef);
    if(!snap.exists() || snap.data().status !== 'ringing'){
      callStateEl.textContent = 'المكالمة انتهت';
      setTimeout(() => window.location.href = `room.html?${params.toString()}`, 1200);
      return;
    }

    callStateEl.textContent = 'مكالمة واردة';
    listenToCallDoc(); // عشان لو الطرف التاني قفل قبل ما تردي

    acceptBtn.addEventListener('click', async () => {
      ringingCalleeActions.classList.add('hidden');
      activeActions.classList.remove('hidden');
      callStateEl.textContent = 'جاري الاتصال...';

      try{
        localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
      } catch(e){
        callStateEl.textContent = 'محتاجة صلاحية الميكروفون';
        await endCall('error');
        return;
      }

      pc = new RTCPeerConnection(ICE_SERVERS);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      attachPcHandlers();

      const data = (await getDoc(callDocRef)).data();
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      flushPendingCandidates();

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await updateDoc(callDocRef, {
        status: 'accepted',
        answer: { type: answer.type, sdp: answer.sdp }
      });

      listenToCandidates('callerCandidates');
    }, { once:true });

    rejectBtn.addEventListener('click', async () => {
      await updateDoc(callDocRef, { status: 'rejected' }).catch(()=>{});
      callEnded = true;
      // تأخير بسيط قبل حذف مستند المكالمة، عشان نضمن إن الطرف التاني
      // ياخد فرصة يستلم تحديث status:'rejected' قبل ما يتشال المستند
      setTimeout(cleanupAndClose, 600);
    }, { once:true });
  }

  // ====================================================
  // أحداث RTCPeerConnection المشتركة
  // ====================================================
  let disconnectWatchdog = null; // تأخير قبل اعتبار الاتصال منتهي فعلاً
  let iceRestartAttempts = 0; // عداد محاولات إعادة تشغيل ICE
  const MAX_ICE_RESTART_ATTEMPTS = 3; // الحد الأقصى لمحاولات إعادة التشغيل

  async function attemptIceRestart(){
    if(!pc || iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
      if(iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
        endCall('failed');
      }
      return;
    }
    
    iceRestartAttempts++;
    console.log(`[v0] ICE restart attempt ${iceRestartAttempts}/${MAX_ICE_RESTART_ATTEMPTS}`);
    
    try{
      // استخدم exponential backoff قبل المحاولة
      const delayMs = Math.pow(2, iceRestartAttempts - 1) * 500; // 500ms, 1s, 2s
      await new Promise(resolve => setTimeout(resolve, delayMs));
      
      if(pc){
        await pc.restartIce();
        console.log('[v0] ICE restart requested');
      }
    } catch(e){
      console.log('[v0] ICE restart error:', e.message);
      if(iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
        endCall('failed');
      }
    }
  }

  function attachPcHandlers(){
    // ── الصوت: بنشغّله مباشرة وبنحافظ على srcObject حتى لو ontrack اتنادي أكتر من مرة ──
    pc.ontrack = (event) => {
      if(!event.streams || !event.streams[0]) return;
      if(remoteAudio.srcObject !== event.streams[0]){
        remoteAudio.srcObject = event.streams[0];
      }
      // ضمان التشغيل على كل الأجهزة
      remoteAudio.muted = false;
      remoteAudio.volume = 1.0;
      const tryPlay = () => {
        const p = remoteAudio.play();
        if(p) p.catch(() => {
          // المتصفح رفض autoplay - منتظرين أول تفاعل
          const resume = () => { remoteAudio.play().catch(()=>{}); };
          document.addEventListener('touchstart', resume, { once:true });
          document.addEventListener('click',      resume, { once:true });
          document.addEventListener('keydown',    resume, { once:true });
        });
      };
      // تأخير بسيط عشان الـ stream يتجهز على iOS
      setTimeout(tryPlay, 80);
    };

    // ── ICE candidates ──
    const candidateField = role === 'caller' ? 'callerCandidates' : 'answerCandidates';
    pc.onicecandidate = (event) => {
      if(event.candidate){
        addDoc(collection(db, 'calls', chatId, candidateField), event.candidate.toJSON()).catch(()=>{});
      }
    };

    // ── حالة الاتصال العام ──
    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      if(s === 'connected'){
        // إلغاء أي watchdog معلّق وتسجيل الاتصال
        clearTimeout(disconnectWatchdog);
        disconnectWatchdog = null;
        if(!wasConnected) onConnected();
      }
      if(s === 'disconnected'){
        // نديه 6 ثواني فرصة يرجع (ICE restart) قبل ما نقفل
        if(!disconnectWatchdog){
          disconnectWatchdog = setTimeout(() => {
            if(!callEnded && pc && pc.connectionState !== 'connected'){
              endCall('disconnected');
            }
          }, 6000);
        }
      }
      if(s === 'failed'){
        clearTimeout(disconnectWatchdog);
        endCall('failed');
      }
    };

    // ── ICE state ──
    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if(s === 'connected' || s === 'completed'){
        clearTimeout(disconnectWatchdog);
        iceRestartAttempts = 0; // إعادة تعيين عداد المحاولات عند الاتصال الناجح
        if(!wasConnected) onConnected();
      }
      if(s === 'failed'){
        console.log('[v0] ICE connection state: failed, attempting restart');
        attemptIceRestart();
      }
      if(s === 'disconnected'){
        if(!disconnectWatchdog){
          disconnectWatchdog = setTimeout(() => {
            if(!callEnded && pc && pc.iceConnectionState !== 'connected' && pc.iceConnectionState !== 'completed'){
              console.log('[v0] ICE disconnected for 8s, attempting restart');
              attemptIceRestart();
            }
          }, 8000);
        }
      }
    };
  }

  function listenToCandidates(subcollection){
    const q = query(collection(db, 'calls', chatId, subcollection));
    unsubCandidates = onSnapshotSub(q, (snap) => {
      snap.docChanges().forEach(change => {
        if(change.type === 'added'){
          const candidateData = change.doc.data();
          if(pc && pc.remoteDescription && pc.remoteDescription.type){
            pc.addIceCandidate(new RTCIceCandidate(candidateData)).catch(()=>{});
          } else {
            // لسه مفيش remoteDescription، أجّلي الـ candidate لحد ما يتظبط
            pendingCandidates.push(candidateData);
          }
        }
      });
    });
  }

  function flushPendingCandidates(){
    if(!pc) return;
    while(pendingCandidates.length){
      const c = pendingCandidates.shift();
      pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{});
    }
  }

  function listenToCallDoc(){
    unsubCallDoc = onSnapshot(callDocRef, async (snap) => {
      if(!snap.exists()){
        if(!callEnded) cleanupAndClose();
        return;
      }
      const data = snap.data();

      if(data.status === 'rejected' && role === 'caller'){
        callStateEl.textContent = 'تم رفض المكالمة';
        callEnded = true;
        logCallToChat('rejected');
        setTimeout(cleanupAndClose, 1400);
        return;
      }

      if(data.status === 'accepted' && role === 'caller' && pc && !pc.currentRemoteDescription && data.answer){
        callStateEl.textContent = 'جاري الاتصال...';
        try{
          await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
          flushPendingCandidates();
        } catch(e){
          console.log('[v0] Error setting remote description:', e.message);
        }
      }

      if(data.status === 'ended'){
        if(!callEnded){
          callEnded = true;
          finishCall('انتهت المكالمة');
        }
      }
    });
  }

  function onConnected(){
    if(wasConnected) return; // منتنادي غير مرة
    wasConnected = true;
    clearTimeout(disconnectWatchdog);
    disconnectWatchdog = null;
    callStateEl.textContent = '';
    callTimerEl.classList.add('show');
    peerAvatarEl.classList.add('connected');
    muteBtn.classList.remove('hidden');
    speakerBtn.classList.remove('hidden');
    inviteBtn.classList.remove('hidden');
    startTimer();
    
    // إرسال حدث busy status عند بدء المكالمة
    if(currentUser && currentUser.uid){
      updateDoc(doc(db, 'users', currentUser.uid), {
        currentStatus: 'busy',
        busyStartTime: serverTimestamp()
      }).catch(e => console.log('[v0] Error updating busy status:', e.message));
    }
  }

  function startTimer(){
    callSeconds = 0;
    timerInterval = setInterval(() => {
      callSeconds++;
      const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
      const s = String(callSeconds%60).padStart(2,'0');
      callTimerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  // ====================================================
  // كتابة رسالة سجل المكالمة في الشات
  // ====================================================
  async function logCallToChat(callStatus){
    if(callLogWritten || !currentUser) return;
    callLogWritten = true;
    try{
      const lastMessageLabel = callStatus === 'missed'
        ? '📵 مكالمة فائتة'
        : callStatus === 'rejected'
          ? '📵 مكالمة مرفوضة'
          : '📞 مكالمة صوتية';

      await setDoc(doc(db, 'chats', chatId), {
        members: [currentUser.uid, peerUid],
        updatedAt: serverTimestamp(),
        lastMessage: lastMessageLabel
      }, { merge: true });

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        type: 'call',
        callStatus: callStatus,
        duration: callSeconds,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch(e){}
  }

  // ====================================================
  // إنهاء المكالمة
  // ====================================================
  async function endCall(reason){
    if(callEnded) return;
    callEnded = true;
    clearTimeout(disconnectWatchdog);
    const status = reason === 'no_answer' ? 'missed' : (wasConnected ? 'ended' : 'missed');
    logCallToChat(status);
    try{
      await updateDoc(callDocRef, { status: 'ended' }).catch(()=>{});
    } finally {
      // تحديث حالة المستخدم إلى active عند إنهاء المكالمة
      if(currentUser && currentUser.uid){
        updateDoc(doc(db, 'users', currentUser.uid), {
          currentStatus: 'active'
        }).catch(e => console.log('[v0] Error updating user status:', e.message));
      }
      
      const msg = reason === 'no_answer' ? 'لا يوجد رد' :
                  reason === 'user_hangup' ? 'تم إنهاء المكالمة' :
                  wasConnected ? 'انقطع الاتصال' : 'تعذر الاتصال';
      finishCall(msg);
    }
  }

  function finishCall(message){
    callEnded = true;
    callStateEl.textContent = message;
    callTimerEl.classList.remove('show');
    clearInterval(timerInterval);
    setTimeout(cleanupAndClose, 1500);
  }

  function cleanupAndClose(){
    clearTimeout(disconnectWatchdog);
    try{ unsubCallDoc && unsubCallDoc(); }catch(e){}
    try{ unsubCandidates && unsubCandidates(); }catch(e){}
    try{ localStream && localStream.getTracks().forEach(t => t.stop()); }catch(e){}
    try{ if(remoteAudio){ remoteAudio.srcObject = null; remoteAudio.pause(); } }catch(e){}
    try{ pc && pc.close(); }catch(e){}
    deleteDoc(callDocRef).catch(()=>{});
    window.location.href = `room.html?chatId=${encodeURIComponent(chatId)}&uid=${encodeURIComponent(peerUid)}&name=${encodeURIComponent(peerName)}`;
  }

  endBtn.addEventListener('click', () => endCall('user_hangup'));

  muteBtn.addEventListener('click', () => {
    if(!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    muteBtn.classList.toggle('active', isMuted);
    muteBtn.textContent = isMuted ? '🔇' : '🎤';
  });

  // ====================================================
  // تبديل مكبر الصوت (Speaker) - زي زرار "Speaker" في الواتساب
  // ====================================================
  let speakerOn = true; // مفعّل افتراضيًا، الصوت بيخرج من السماعة الخارجية
  remoteAudio.volume = 1.0;

  speakerBtn.addEventListener('click', async () => {
    speakerOn = !speakerOn;
    speakerBtn.classList.toggle('active', speakerOn);
    speakerBtn.textContent = speakerOn ? '🔊' : '🔈';

    // لو المتصفح بيدعم setSinkId (تبديل فعلي بين سماعة الأذن والمكبر الخارجي)
    if(typeof remoteAudio.setSinkId === 'function'){
      try{
        const devices = await navigator.mediaDevices.enumerateDevices();
        const speakerDevice = devices.find(d => d.kind === 'audiooutput' &&
          /speaker|loud|external/i.test(d.label));
        const earpieceDevice = devices.find(d => d.kind === 'audiooutput' &&
          /earpiece|receiver/i.test(d.label));

        if(speakerOn && speakerDevice){
          await remoteAudio.setSinkId(speakerDevice.deviceId);
        } else if(!speakerOn && earpieceDevice){
          await remoteAudio.setSinkId(earpieceDevice.deviceId);
        } else {
          await remoteAudio.setSinkId('default');
        }
      } catch(e){
        // setSinkId غير مدعومة أو فشلت، نكتفي بالتحكم في مستوى الصوت
        remoteAudio.volume = speakerOn ? 1.0 : 0.6;
      }
    } else {
      // فallback: التحكم في مستوى الصوت بس (أغلب متصفحات الموبايل بتطلع الصوت
      // من المكبر الخارجي افتراضيًا أثناء استخدام الكاميرا/المايك بأي حال)
      remoteAudio.volume = speakerOn ? 1.0 : 0.6;
    }
  });

  // ====================================================
  // مجموعة المكالمات - إضافة أصدقاء وبدء مكالمة جماعية
  // ====================================================
  const groupCallModal = document.getElementById('groupCallModal');
  const friendsList = document.getElementById('friendsList');
  const inviteBtn = document.getElementById('inviteBtn');
  const cancelGroupBtn = document.getElementById('cancelGroupBtn');
  const startGroupBtn = document.getElementById('startGroupBtn');
  let selectedFriends = new Set();

  // تحميل قائمة الأصدقاء عند النقر على زر الإضافة
  inviteBtn.addEventListener('click', async () => {
    try{
      // جلب جميع المستخدمين المسجلين (Accounts) من Firestore
      const usersCollection = await getDocs(collection(db, 'users'));
      const availableUsers = [];
      
      usersCollection.forEach(doc => {
        const userData = doc.data();
        // تصفية المستخدم الحالي والمستخدمين المحظوريين
        if(doc.id !== currentUser.uid && !userData.blockedUsers?.includes(currentUser.uid)){
          availableUsers.push({
            uid: doc.id,
            name: userData.name || userData.displayName || userData.email || 'مستخدم',
            email: userData.email || '',
            isOnline: userData.isOnline || false,
            photoURL: userData.photoURL || null
          });
        }
      });
      
      if(availableUsers.length === 0){
        console.log('[v0] No available accounts');
        friendsList.innerHTML = '<p style="text-align:center; color:var(--muted);">لا توجد حسابات متاحة</p>';
      } else {
        friendsList.innerHTML = '';
        // ترتيب المستخدمين النشطين أولاً
        availableUsers.sort((a, b) => (b.isOnline ? 1 : 0) - (a.isOnline ? 1 : 0));
        
        for(const user of availableUsers){
          const friendItem = document.createElement('div');
          friendItem.className = 'friend-item';
          const onlineIndicator = user.isOnline ? '🟢' : '⚪';
          const avatarHtml = user.photoURL
            ? `<img src="${user.photoURL}" alt="${user.name}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
            : `<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#06121C;flex-shrink:0;">${user.name.charAt(0).toUpperCase()}</div>`;
          friendItem.innerHTML = `
            <input type="checkbox" value="${user.uid}" class="friend-checkbox">
            ${avatarHtml}
            <div class="friend-info">
              <div class="friend-name">${onlineIndicator} ${user.name}</div>
              <div class="friend-email">${user.email || 'بدون بريد'}</div>
            </div>
          `;
          const checkbox = friendItem.querySelector('.friend-checkbox');
          checkbox.addEventListener('change', (e) => {
            if(e.target.checked){
              selectedFriends.add(user.uid);
            } else {
              selectedFriends.delete(user.uid);
            }
            startGroupBtn.disabled = selectedFriends.size === 0;
          });
          friendsList.appendChild(friendItem);
        }
      }
      groupCallModal.classList.add('show');
    } catch(e){
      console.log('[v0] Error loading available accounts:', e.message);
    }
  });

  cancelGroupBtn.addEventListener('click', () => {
    groupCallModal.classList.remove('show');
    selectedFriends.clear();
    startGroupBtn.disabled = true;
  });

  startGroupBtn.addEventListener('click', async () => {
    if(selectedFriends.size === 0) return;
    
    try{
      // إرسال حدث بدء مكالمة جماعية (يتطلب Socket.io على الخادم)
      console.log(`[v0] Starting group call with ${selectedFriends.size} friends:`, Array.from(selectedFriends));
      
      // الآن يمكن إرسال حدث Socket.io (إذا كان متوفراً):
      // if(window.socket){
      //   socket.emit('start_group_call', {
      //     initiatorUid: currentUser.uid,
      //     selectedFriendUids: Array.from(selectedFriends),
      //     chatId: chatId
      //   });
      // }
      
      // إغلاق النافذة
      groupCallModal.classList.remove('show');
      selectedFriends.clear();
      startGroupBtn.disabled = true;
    } catch(e){
      console.log('[v0] Error starting group call:', e.message);
    }
  });

  // إغلاق النافذة عند الضغط على خلفية overlay
  groupCallModal.addEventListener('click', (e) => {
    if(e.target === groupCallModal){
      groupCallModal.classList.remove('show');
      selectedFriends.clear();
      startGroupBtn.disabled = true;
    }
  });

  window.addEventListener('beforeunload', () => {
    if(!callEnded){
      updateDoc(callDocRef, { status: 'ended' }).catch(()=>{});
    }
  });
</script>
