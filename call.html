<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AChat | مكالمة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070B14;
    --surface:#0E1526;
    --surface-2:#131B2F;
    --border-soft: rgba(255,255,255,.08);
    --cyan:#2FE0FF;
    --cyan-deep:#1A4FD1;
    --text:#EAF2FA;
    --muted:#7C8AA3;
    --danger:#FF5D75;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }
  body{
    font-family:'Cairo', sans-serif;
    color:var(--text);
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    background:
      radial-gradient(circle at 22% 18%, rgba(47,224,255,.14), transparent 42%),
      radial-gradient(circle at 85% 80%, rgba(26,79,209,.18), transparent 46%),
      var(--void);
    overflow:hidden;
    padding:36px 24px 32px;
    text-align:center;
  }

  .call-top{ width:100%; }
  .call-state{
    font-size:13.5px;
    color:var(--muted);
    font-weight:600;
    letter-spacing:.3px;
    margin-bottom:6px;
    min-height:18px;
  }
  .call-timer{
    font-size:13.5px;
    color:var(--cyan);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    display:none;
  }
  .call-timer.show{ display:inline-block; }

  .call-mid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .peer-avatar{
    width:128px; height:128px; border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));
    color:#06121C;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:46px;
    overflow:hidden;
    box-shadow:0 0 0 1px var(--border-soft), 0 30px 70px -20px rgba(47,224,255,.35);
    position:relative;
  }
  .peer-avatar img{ width:100%; height:100%; object-fit:cover; }
  .peer-avatar::after{
    content:"";
    position:absolute; inset:-10px;
    border-radius:50%;
    border:1.5px solid rgba(47,224,255,.35);
    animation:ringPulse 1.8s ease-out infinite;
  }
  .peer-avatar.connected::after{ display:none; }
  @keyframes ringPulse{
    0%{ transform:scale(.94); opacity:.9; }
    80%{ transform:scale(1.18); opacity:0; }
    100%{ opacity:0; }
  }
  .peer-name{ font-size:21px; font-weight:800; }
  .peer-sub{ font-size:13.5px; color:var(--muted); }

  .call-actions{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:24px;
    padding:16px 0;
    animation:slideUp .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp{
    from{ transform:translateY(20px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .call-btn{
    width:58px; height:58px;
    border-radius:50%;
    border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:23px;
    cursor:pointer;
    transition:all .18s cubic-bezier(0.34, 1.56, 0.64, 1);
    flex-shrink:0;
    font-weight:600;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .call-btn:hover{ 
    transform:scale(1.08);
    box-shadow:0 6px 16px rgba(0,0,0,.22);
  }
  .call-btn:active{ 
    transform:scale(.95);
    box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  
  .call-btn.mute{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
  }
  .call-btn.mute:hover{
    background:rgba(255,255,255,.15);
    border-color:rgba(255,255,255,.25);
  }
  .call-btn.mute.active{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.speaker{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
  }
  .call-btn.speaker:hover{
    background:rgba(255,255,255,.15);
    border-color:rgba(255,255,255,.25);
  }
  .call-btn.speaker.active{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.invite{
    background:rgba(255,255,255,.1);
    border:1.5px solid rgba(255,255,255,.15);
    color:var(--text);
    font-size:22px;
  }
  .call-btn.invite:hover{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
    border-color:transparent;
  }
  
  .call-btn.end{
    width:66px; height:66px;
    background:linear-gradient(135deg, var(--danger), #C73B54);
    color:#fff;
    font-size:26px;
    box-shadow:0 8px 20px -8px rgba(255,93,117,.5);
    border:none;
  }
  .call-btn.end:hover{
    transform:scale(1.06);
    box-shadow:0 10px 26px -6px rgba(255,93,117,.65);
  }
  
  .call-btn.accept{
    width:66px; height:66px;
    background:linear-gradient(135deg, #2FE08A, #17B66E);
    color:#06121C;
    font-size:26px;
    box-shadow:0 8px 20px -8px rgba(47,224,138,.5);
    animation:acceptPulse 1.4s ease-in-out infinite;
    border:none;
  }
  .call-btn.accept:hover{
    filter:brightness(1.12);
    box-shadow:0 10px 28px -6px rgba(47,224,138,.65);
  }
  
  @keyframes acceptPulse{
    0%,100%{ box-shadow:0 8px 20px -8px rgba(47,224,138,.5); }
    50%{ box-shadow:0 10px 30px -4px rgba(47,224,138,.7); }
  }

  /* ===== Group Call Modal — Bottom Sheet ===== */
  .modal-overlay-group{
    position:fixed; inset:0;
    background:rgba(5,8,16,.75);
    backdrop-filter:blur(4px);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:200;
  }
  .modal-overlay-group.show{ display:flex; }
  .modal-box-group{
    background:var(--surface);
    border:1px solid var(--border-soft);
    border-radius:22px 22px 0 0;
    padding:0 0 env(safe-area-inset-bottom);
    width:100%;
    max-width:520px;
    box-shadow:0 -20px 60px -10px rgba(0,0,0,.7);
    max-height:80vh;
    display:flex;
    flex-direction:column;
    animation:slideUp .28s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideUp{
    from{ transform:translateY(60px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
  }
  .modal-handle{
    width:38px; height:4px;
    border-radius:999px;
    background:rgba(255,255,255,.18);
    margin:12px auto 0;
    flex-shrink:0;
  }
  .modal-box-group h2{
    font-size:16px;
    font-weight:800;
    padding:14px 20px 12px;
    border-bottom:1px solid var(--border-soft);
    flex-shrink:0;
  }
  .friends-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:14px 16px;
    overflow-y:auto;
    flex:1;
  }
  .friends-list::-webkit-scrollbar{ width:5px; }
  .friends-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:10px; }
  .friend-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--border-soft);
    border-radius:14px;
    cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .friend-item:active{
    background:rgba(47,224,255,.08);
    border-color:var(--cyan);
  }
  .friend-item input[type="checkbox"]{
    width:20px; height:20px;
    cursor:pointer;
    accent-color:var(--cyan);
    flex-shrink:0;
  }
  .friend-info{
    flex:1; min-width:0;
    text-align:right;
  }
  .friend-name{
    font-weight:700;
    font-size:14px;
    margin-bottom:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .friend-email{
    font-size:11.5px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    padding:12px 16px 16px;
    border-top:1px solid var(--border-soft);
    flex-shrink:0;
  }
  .modal-actions button{
    flex:1;
    padding:13px;
    border-radius:12px;
    border:1px solid var(--border-soft);
    background:rgba(255,255,255,.06);
    color:var(--text);
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:background .15s;
  }
  .modal-actions button:active{ background:rgba(255,255,255,.1); }
  .modal-actions button.start-btn{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    border:none;
    color:#06121C;
  }
  .modal-actions button.start-btn:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  /* ===== Video Call Mode ===== */
  body.video-mode{
    padding:0;
    justify-content:flex-start;
    background:#000;
  }
  body.video-mode .call-top{
    position:absolute; top:0; left:0; right:0;
    z-index:20;
    padding:18px 20px 40px;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
    text-align:center;
  }
  body.video-mode .call-mid{ display:none; }

  #remoteVideo{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    background:#0A0F1C;
    z-index:1;
    display:none;
  }
  body.video-mode #remoteVideo{ display:block; }

  #localVideo{
    position:fixed;
    width:108px; height:150px;
    top:96px; left:16px;
    border-radius:16px;
    object-fit:cover;
    background:#111;
    z-index:15;
    box-shadow:0 8px 24px rgba(0,0,0,.5), 0 0 0 1.5px rgba(255,255,255,.15);
    transform:scaleX(-1);
    display:none;
    transition:width .35s ease, height .35s ease, top .35s ease, left .35s ease, border-radius .35s ease, box-shadow .35s ease, opacity .2s;
  }
  body.video-mode #localVideo.show{ display:block; }
  #localVideo.camera-off{ opacity:0; }

  /* قبل ما التاني يرد: صورتي أنا تبقى الكبيرة اللي بتملا الشاشة */
  body.video-mode.pre-connect #localVideo{
    width:100%; height:100%;
    top:0; left:0;
    border-radius:0;
    box-shadow:none;
    z-index:2;
  }
  body.video-mode.pre-connect #remoteVideo{ display:none; }

  .video-side-controls{
    position:fixed;
    top:96px; right:16px;
    z-index:16;
    display:none;
    flex-direction:column;
    gap:14px;
  }
  body.video-mode .video-side-controls.show{ display:flex; }
  .video-icon-btn{
    width:44px; height:44px;
    border-radius:50%;
    border:none;
    background:rgba(15,20,30,.55);
    backdrop-filter:blur(6px);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    transition:transform .15s, background .15s;
  }
  .video-icon-btn:active{ transform:scale(.92); }
  .video-icon-btn.active{
    background:linear-gradient(135deg, var(--cyan), #1A8FB8);
    color:#06121C;
  }

  body.video-mode .call-actions{
    position:fixed; bottom:0; left:0; right:0;
    z-index:16;
    padding:16px 24px calc(28px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,.6), transparent);
  }
  body.video-mode .call-btn{
    background:rgba(20,26,38,.6);
    backdrop-filter:blur(6px);
  }
  body.video-mode .call-btn.camera.off{
    background:rgba(255,255,255,.9);
    color:#0A0F1C;
  }

  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

  <audio id="remoteAudio" autoplay playsinline></audio>
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay playsinline muted></video>

  <div class="video-side-controls" id="videoSideControls">
    <button type="button" class="video-icon-btn" id="videoInviteBtn" title="إضافة أشخاص">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </button>
    <button type="button" class="video-icon-btn" id="flipCameraBtn" title="تبديل الكاميرا">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
    </button>
    <button type="button" class="video-icon-btn" id="torchBtn" title="فلاش">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6c0 2-2 3-2 5v11a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1V11c0-2-2-3-2-5V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1z"/><line x1="6" y1="6" x2="18" y2="6"/></svg>
    </button>
  </div>

  <div class="call-top">
    <div class="call-state" id="callState">بيرن...</div>
    <div class="call-timer" id="callTimer">00:00</div>
  </div>

  <div class="call-mid">
    <div class="peer-avatar" id="peerAvatar">؟</div>
    <div>
      <div class="peer-name" id="peerName">...</div>
      <div class="peer-sub" id="peerSub">مكالمة صوتية</div>
    </div>
  </div>

  <div class="call-actions" id="ringingCalleeActions">
    <button type="button" class="call-btn end" id="rejectBtn" title="رفض">✕</button>
    <button type="button" class="call-btn accept" id="acceptBtn" title="قبول">📞</button>
  </div>

  <div class="call-actions hidden" id="activeActions">
    <button type="button" class="call-btn mute" id="muteBtn" title="كتم الصوت">🎤</button>
    <button type="button" class="call-btn camera hidden" id="cameraBtn" title="تشغيل/إيقاف الكاميرا">📷</button>
    <button type="button" class="call-btn speaker" id="speakerBtn" title="مكبر الصوت">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
        <path d="M19 5.5a10 10 0 0 1 0 13"></path>
      </svg>
    </button>
    <button type="button" class="call-btn invite" id="inviteBtn" title="إضافة أشخاص">➕</button>
    <button type="button" class="call-btn end" id="endBtn" title="إنهاء المكالمة">📞</button>
  </div>

  <!-- Group Call Modal — Bottom Sheet -->
  <div class="modal-overlay-group" id="groupCallModal">
    <div class="modal-box-group">
      <div class="modal-handle"></div>
      <h2>اختر الأصدقاء للمكالمة الجماعية</h2>
      <div class="friends-list" id="friendsList"></div>
      <div class="modal-actions">
        <button type="button" id="cancelGroupBtn">إلغاء</button>
        <button type="button" class="start-btn" id="startGroupBtn" disabled>دعوة</button>
      </div>
    </div>
  </div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    doc, getDoc, setDoc, updateDoc, onSnapshot, deleteDoc,
    collection, addDoc, query, onSnapshot as onSnapshotSub, serverTimestamp, deleteField, getDocs
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const chatId = params.get('chatId');
  const peerUid = params.get('uid');
  const peerName = params.get('name') || 'المستخدم';
  const role = params.get('role') === 'callee' ? 'callee' : 'caller'; // caller = اللي بدأ المكالمة
  const isVideo = params.get('video') === '1' || params.get('type') === 'video';
  if(isVideo){
    document.body.classList.add('video-mode', 'pre-connect');
  }

  if(!chatId || !peerUid){
    window.location.href = 'chat.html';
  }

  document.getElementById('peerName').textContent = peerName;
  const peerAvatarEl = document.getElementById('peerAvatar');
  peerAvatarEl.textContent = peerName.charAt(0).toUpperCase();
  getDoc(doc(db, 'users', peerUid)).then(snap => {
    if(snap.exists() && snap.data().photoURL){
      peerAvatarEl.innerHTML = `<img src="${snap.data().photoURL}" alt="${peerName}">`;
    }
  }).catch(() => {});

  const callStateEl = document.getElementById('callState');
  const callTimerEl = document.getElementById('callTimer');
  const ringingCalleeActions = document.getElementById('ringingCalleeActions');
  const activeActions = document.getElementById('activeActions');
  const acceptBtn = document.getElementById('acceptBtn');
  const rejectBtn = document.getElementById('rejectBtn');
  const endBtn = document.getElementById('endBtn');
  const muteBtn = document.getElementById('muteBtn');
  const speakerBtn = document.getElementById('speakerBtn');
  const inviteBtn = document.getElementById('inviteBtn');
  const remoteAudio = document.getElementById('remoteAudio');
  const remoteVideo = document.getElementById('remoteVideo');
  const localVideo = document.getElementById('localVideo');
  const cameraBtn = document.getElementById('cameraBtn');
  const flipCameraBtn = document.getElementById('flipCameraBtn');
  const torchBtn = document.getElementById('torchBtn');
  const videoInviteBtn = document.getElementById('videoInviteBtn');
  const videoSideControls = document.getElementById('videoSideControls');

  if(isVideo){
    document.getElementById('peerSub').textContent = 'مكالمة فيديو';
    cameraBtn.classList.remove('hidden');
    videoInviteBtn.addEventListener('click', () => inviteBtn.click());
  }

  let isCameraOff = false;
  let facingMode = 'user';   // user = كاميرا أمامية / environment = خلفية
  let torchOn = false;
  let currentFacingTrack = null;

  // الوضع الافتراضي: لو إنتِ اللي بدأتِ المكالمة، الأزرار اللي تتظهر هي "إنهاء" بس فورًا
  if(role === 'caller'){
    ringingCalleeActions.classList.add('hidden');
    activeActions.classList.remove('hidden');
    // إخفاء أزرار الكتم والسماعة وإضافة أشخاص لحد ما المكالمة تتوصل فعليًا
    muteBtn.classList.add('hidden');
    speakerBtn.classList.add('hidden');
    inviteBtn.classList.add('hidden');
    if(isVideo) cameraBtn.classList.add('hidden');
  } else {
    // المستقبل: يظهرله أزرار الرد/الرفض فقط في البداية
    ringingCalleeActions.classList.remove('hidden');
    activeActions.classList.add('hidden');
  }

  let currentUser = null;
  let myDisplayName = '';
  let pc = null;
  let localStream = null;
  let callDocRef = null;
  let unsubCallDoc = null;
  let unsubCandidates = null;
  let timerInterval = null;
  let callEnded = false;
  let isMuted = false;
  let pendingCandidates = []; // ICE candidates توصل قبل ما remoteDescription يتظبط، بنأجلها هنا
  let callSeconds = 0;       // مدة المكالمة الفعلية بعد ما اتوصلت
  let wasConnected = false;  // هل المكالمة اتوصلت فعلاً ولو لحظة
  let callLogWritten = false; // عشان منكتبش رسالة المكالمة في الشات أكتر من مرة

  // ====================================================
  // ✳️ إعداد TURN المهم عشان الصوت يشتغل بين شبكات مختلفة
  // ====================================================
  const METERED_APP_NAME = 'achat-2026';
  const METERED_API_KEY  = '5ab0dc5b8e6f1487b1bb282247268bd175da';

  const FALLBACK_STUN_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ];

  async function getIceServers(){
    try{
      const res = await fetch(`https://${METERED_APP_NAME}.metered.live/api/v1/turn/credentials?apiKey=${METERED_API_KEY}`);
      if(res.ok){
        const iceServers = await res.json();
        return {
          iceServers,
          iceCandidatePoolSize: 10
        };
      } else {
        console.log('[v0] Metered TURN request failed:', res.status);
      }
    } catch(e){
      console.log('[v0] Metered TURN fetch error:', e.message);
    }
    return {
      iceServers: FALLBACK_STUN_SERVERS,
      iceCandidatePoolSize: 10
    };
  }

  async function compressImage(file, maxWidth = 800, quality = 0.7){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          if(width > maxWidth){
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          canvas.toBlob(blob => {
            console.log(`[v0] Image compressed: ${(file.size / 1024).toFixed(2)}KB → ${(blob.size / 1024).toFixed(2)}KB`);
            resolve(blob);
          }, 'image/jpeg', quality);
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = event.target.result;
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  }

  function trackSupportsTorch(track){
    try{
      if(!track || typeof track.getCapabilities !== 'function') return false;
      const caps = track.getCapabilities();
      return !!(caps && caps.torch);
    } catch(e){
      return false;
    }
  }

  function updateTorchAvailability(track){
    const supported = trackSupportsTorch(track);
    torchBtn.style.display = supported ? 'flex' : 'none';
    if(!supported){
      torchOn = false;
      torchBtn.classList.remove('active');
    }
    return supported;
  }

  function setupLocalVideoPreview(){
    if(!isVideo || !localStream) return;
    localVideo.srcObject = localStream;
    localVideo.classList.add('show');
    videoSideControls.classList.add('show');
    const track = localStream.getVideoTracks()[0];
    updateTorchAvailability(track);
  }

  cameraBtn.addEventListener('click', () => {
    if(!localStream) return;
    isCameraOff = !isCameraOff;
    localStream.getVideoTracks().forEach(t => t.enabled = !isCameraOff);
    cameraBtn.classList.toggle('off', isCameraOff);
    cameraBtn.textContent = isCameraOff ? '🚫' : '📷';
    localVideo.classList.toggle('camera-off', isCameraOff);
  });

  let isFlippingCamera = false;
  flipCameraBtn.addEventListener('click', async () => {
    if(!localStream || !pc || isFlippingCamera) return;
    isFlippingCamera = true;
    const previousFacingMode = facingMode;
    const newFacingMode = facingMode === 'user' ? 'environment' : 'user';
    const oldTrack = localStream.getVideoTracks()[0];

    try{
      // لازم نقفل الكاميرا القديمة الأول، لأن كتير من الموبايلات مش بتسمح
      // بفتح الكاميرا الأمامية والخلفية في نفس الوقت، وده كان بيسبب فشل التبديل بصمت
      if(oldTrack){ oldTrack.stop(); localStream.removeTrack(oldTrack); }

      const newStream = await navigator.mediaDevices.getUserMedia({
        audio:false, video:{ facingMode:{ ideal:newFacingMode } }
      });
      const newTrack = newStream.getVideoTracks()[0];
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if(sender) await sender.replaceTrack(newTrack);

      localStream.addTrack(newTrack);
      localVideo.srcObject = localStream;
      facingMode = newFacingMode;
      localVideo.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
      updateTorchAvailability(newTrack);
    } catch(e){
      console.log('[v0] Error flipping camera:', e.message);
      facingMode = previousFacingMode;
      // حاولي ترجعي لنفس الكاميرا القديمة عشان الشاشة ماتفضلش من غير كاميرا خالص
      try{
        const fallbackStream = await navigator.mediaDevices.getUserMedia({
          audio:false, video:{ facingMode:{ ideal:previousFacingMode } }
        });
        const fallbackTrack = fallbackStream.getVideoTracks()[0];
        const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
        if(sender) await sender.replaceTrack(fallbackTrack);
        localStream.addTrack(fallbackTrack);
        localVideo.srcObject = localStream;
        updateTorchAvailability(fallbackTrack);
      } catch(e2){
        console.log('[v0] Could not restore previous camera:', e2.message);
      }
    } finally {
      isFlippingCamera = false;
    }
  });

  torchBtn.addEventListener('click', async () => {
    if(!localStream) return;
    const track = localStream.getVideoTracks()[0];
    if(!track || !trackSupportsTorch(track)) return;
    const nextTorchOn = !torchOn;
    try{
      await track.applyConstraints({ advanced: [{ torch: nextTorchOn }] });
      torchOn = nextTorchOn;
      torchBtn.classList.toggle('active', torchOn);
    } catch(e){
      console.log('[v0] Torch not supported on this camera:', e.message);
    }
  });

  async function resolveMyDisplayName(){
    let myName = currentUser.displayName || '';
    if(!myName){
      try{
        const mySnap = await getDoc(doc(db, 'users', currentUser.uid));
        if(mySnap.exists()) myName = mySnap.data().name || mySnap.data().displayName || '';
      } catch(e){}
    }
    if(!myName) myName = currentUser.email ? currentUser.email.split('@')[0] : 'مستخدم';
    return myName;
  }

  onAuthStateChanged(auth, async (user) => {
    if(!user){ window.location.href = 'index.html'; return; }
    currentUser = user;
    myDisplayName = await resolveMyDisplayName();
    callDocRef = doc(db, 'calls', chatId);
    if(role === 'caller') startAsCaller();
    else startAsCallee();
  });

  // ====================================================
  // الطرف اللي بدأ المكالمة
  // ====================================================
  async function startAsCaller(){
    const myName = myDisplayName;

    try{
      localStream = await navigator.mediaDevices.getUserMedia(
        isVideo ? { audio:true, video:{ facingMode:'user' } } : { audio:true, video:false }
      );
    } catch(e){
      callStateEl.textContent = isVideo ? 'محتاجة صلاحية الكاميرا والميكروفون' : 'محتاجة صلاحية الميكروفون';
      setTimeout(() => window.close() || (window.location.href = `room.html?${params.toString()}`), 1800);
      return;
    }
    setupLocalVideoPreview();

    pc = new RTCPeerConnection(await getIceServers());
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    attachPcHandlers();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await setDoc(callDocRef, {
      callerUid: currentUser.uid,
      calleeUid: peerUid,
      callerName: myName,
      status: 'ringing',
      isVideo: isVideo,
      offer: { type: offer.type, sdp: offer.sdp },
      createdAt: serverTimestamp()
    });

    callStateEl.textContent = 'بيرن...';
    listenToCallDoc();
    listenToCandidates('answerCandidates');

    // مهلة عدم رد
    setTimeout(() => {
      if(!callEnded && !wasConnected){
        endCall('no_answer');
      }
    }, 40000);
  }

  // ====================================================
  // الطرف اللي بيستقبل المكالمة
  // ====================================================
  async function startAsCallee(){
    const snap = await getDoc(callDocRef);
    if(!snap.exists() || snap.data().status !== 'ringing'){
      callStateEl.textContent = 'المكالمة انتهت';
      setTimeout(() => window.location.href = `room.html?${params.toString()}`, 1200);
      return;
    }

    callStateEl.textContent = 'مكالمة واردة';
    listenToCallDoc(); // عشان لو الطرف التاني قفل قبل ما تردي

    acceptBtn.addEventListener('click', async () => {
      ringingCalleeActions.classList.add('hidden');
      activeActions.classList.remove('hidden');
      callStateEl.textContent = 'جارٍ توصيل الصوت...';

      try{
        localStream = await navigator.mediaDevices.getUserMedia(
          isVideo ? { audio:true, video:{ facingMode:'user' } } : { audio:true, video:false }
        );
      } catch(e){
        callStateEl.textContent = isVideo ? 'محتاجة صلاحية الكاميرا والميكروفون' : 'محتاجة صلاحية الميكروفون';
        await endCall('error');
        return;
      }
      setupLocalVideoPreview();

      pc = new RTCPeerConnection(await getIceServers());
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      attachPcHandlers();

      const data = (await getDoc(callDocRef)).data();
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      flushPendingCandidates();

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await updateDoc(callDocRef, {
        status: 'accepted',
        answer: { type: answer.type, sdp: answer.sdp }
      });

      listenToCandidates('callerCandidates');
    }, { once:true });

    rejectBtn.addEventListener('click', async () => {
      await updateDoc(callDocRef, { status: 'rejected' }).catch(()=>{});
      callEnded = true;
      // تأخير بسيط قبل حذف مستند المكالمة، عشان نضمن إن الطرف التاني
      // ياخد فرصة يستلم تحديث status:'rejected' قبل ما يتشال المستند
      setTimeout(cleanupAndClose, 600);
    }, { once:true });
  }

  // ====================================================
  // أحداث RTCPeerConnection المشتركة
  // ====================================================
  let disconnectWatchdog = null; // تأخير قبل اعتبار الاتصال منتهي فعلاً
  let iceRestartAttempts = 0; // عداد محاولات إعادة تشغيل ICE
  const MAX_ICE_RESTART_ATTEMPTS = 3; // الحد الأقصى لمحاولات إعادة التشغيل

  async function attemptIceRestart(){
    if(!pc || iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
      if(iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
        endCall('failed');
      }
      return;
    }
    
    iceRestartAttempts++;
    console.log(`[v0] ICE restart attempt ${iceRestartAttempts}/${MAX_ICE_RESTART_ATTEMPTS}`);
    
    try{
      const delayMs = Math.pow(2, iceRestartAttempts - 1) * 500;
      await new Promise(resolve => setTimeout(resolve, delayMs));
      
      if(pc){
        await pc.restartIce();
        console.log('[v0] ICE restart requested');
      }
    } catch(e){
      console.log('[v0] ICE restart error:', e.message);
      if(iceRestartAttempts >= MAX_ICE_RESTART_ATTEMPTS){
        endCall('failed');
      }
    }
  }

  function attachPcHandlers(){
    pc.ontrack = (event) => {
      if(!event.streams || !event.streams[0]) return;

      if(isVideo){
        // في مكالمة الفيديو الصوت بيتشغل مع الفيديو من نفس العنصر، فمفيش داعي لعنصر audio منفصل
        if(remoteVideo.srcObject !== event.streams[0]){
          remoteVideo.srcObject = event.streams[0];
        }
        remoteVideo.muted = false;
        remoteVideo.volume = 1.0;
        remoteVideo.play().catch(() => {});
        document.body.classList.remove('pre-connect');
        applyDefaultAudioRoute();
        return;
      }

      if(remoteAudio.srcObject !== event.streams[0]){
        remoteAudio.srcObject = event.streams[0];
      }
      remoteAudio.muted = false;
      remoteAudio.volume = 1.0;

      const tryPlay = () => {
        remoteAudio.muted = false;
        remoteAudio.volume = 1.0;
        const p = remoteAudio.play();
        if(p){
          p.then(() => {
            const banner = document.getElementById('audioUnlockBanner');
            if(banner) banner.remove();
          }).catch(() => {
            showAudioUnlockBanner();
          });
        }
        // نجبر الصوت يشتغل من سماعة المكالمات فوق مش من مكبر الصوت تحت
        applyDefaultAudioRoute();
      };
      setTimeout(tryPlay, 150);
      setTimeout(tryPlay, 800);
    };

    function showAudioUnlockBanner(){
      if(document.getElementById('audioUnlockBanner')) return;
      const banner = document.createElement('button');
      banner.id = 'audioUnlockBanner';
      banner.textContent = '🔊 انقر هنا لتشغيل الصوت';
      banner.style.cssText = `
        position:fixed; bottom:140px; left:50%; transform:translateX(-50%);
        background:#2FE0FF; color:#06121C; font-weight:800; font-size:15px;
        border:none; border-radius:30px; padding:12px 28px; z-index:999;
        cursor:pointer; box-shadow:0 6px 24px rgba(47,224,255,.5);
        font-family:'Cairo',sans-serif;
      `;
      banner.addEventListener('click', () => {
        remoteAudio.muted = false;
        remoteAudio.volume = 1.0;
        remoteAudio.play().catch(()=>{});
        banner.remove();
      }, { once:true });
      document.body.appendChild(banner);
    }

    const candidateField = role === 'caller' ? 'callerCandidates' : 'answerCandidates';
    pc.onicecandidate = (event) => {
      if(event.candidate){
        addDoc(collection(db, 'calls', chatId, candidateField), event.candidate.toJSON()).catch(()=>{});
      }
    };

    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      if(s === 'connected'){
        clearTimeout(disconnectWatchdog);
        disconnectWatchdog = null;
        if(!wasConnected) onConnected();
      }
      if(s === 'disconnected'){
        if(!disconnectWatchdog){
          disconnectWatchdog = setTimeout(() => {
            if(!callEnded && pc && pc.connectionState !== 'connected'){
              endCall('disconnected');
            }
          }, 6000);
        }
      }
      if(s === 'failed'){
        clearTimeout(disconnectWatchdog);
        endCall('failed');
      }
    };

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if(s === 'connected' || s === 'completed'){
        clearTimeout(disconnectWatchdog);
        iceRestartAttempts = 0;
        if(!wasConnected) onConnected();
      }
      if(s === 'failed'){
        console.log('[v0] ICE connection state: failed, attempting restart');
        attemptIceRestart();
      }
      if(s === 'disconnected'){
        if(!disconnectWatchdog){
          disconnectWatchdog = setTimeout(() => {
            if(!callEnded && pc && pc.iceConnectionState !== 'connected' && pc.iceConnectionState !== 'completed'){
              console.log('[v0] ICE disconnected for 8s, attempting restart');
              attemptIceRestart();
            }
          }, 8000);
        }
      }
    };
  }

  function listenToCandidates(subcollection){
    const q = query(collection(db, 'calls', chatId, subcollection));
    unsubCandidates = onSnapshotSub(q, (snap) => {
      snap.docChanges().forEach(change => {
        if(change.type === 'added'){
          const candidateData = change.doc.data();
          if(pc && pc.remoteDescription && pc.remoteDescription.type){
            pc.addIceCandidate(new RTCIceCandidate(candidateData)).catch(()=>{});
          } else {
            pendingCandidates.push(candidateData);
          }
        }
      });
    });
  }

  function flushPendingCandidates(){
    if(!pc) return;
    while(pendingCandidates.length){
      const c = pendingCandidates.shift();
      pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{});
    }
  }

  function listenToCallDoc(){
    unsubCallDoc = onSnapshot(callDocRef, async (snap) => {
      if(!snap.exists()){
        if(!callEnded) cleanupAndClose();
        return;
      }
      const data = snap.data();

      if(data.status === 'rejected' && role === 'caller'){
        callStateEl.textContent = 'تم رفض المكالمة';
        callEnded = true;
        logCallToChat('rejected');
        setTimeout(cleanupAndClose, 1400);
        return;
      }

      if(data.status === 'accepted' && role === 'caller' && pc && !pc.currentRemoteDescription && data.answer){
        callStateEl.textContent = 'جارٍ توصيل الصوت...';
        try{
          await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
          flushPendingCandidates();
        } catch(e){
          console.log('[v0] Error setting remote description:', e.message);
        }
      }

      if(data.status === 'ended'){
        if(!callEnded){
          callEnded = true;
          finishCall('انتهت المكالمة');
        }
      }
    });
  }

  function onConnected(){
    if(wasConnected) return;
    wasConnected = true;
    clearTimeout(disconnectWatchdog);
    disconnectWatchdog = null;
    callStateEl.textContent = '';
    callTimerEl.classList.add('show');
    peerAvatarEl.classList.add('connected');
    muteBtn.classList.remove('hidden');
    speakerBtn.classList.remove('hidden');
    inviteBtn.classList.remove('hidden');
    if(isVideo){
      cameraBtn.classList.remove('hidden');
      document.body.classList.remove('pre-connect');
    }
    startTimer();
    if(remoteAudio.srcObject){
      remoteAudio.muted = false;
      remoteAudio.volume = 1.0;
      remoteAudio.play().catch(()=>{});
    }
    
    if(currentUser && currentUser.uid){
      updateDoc(doc(db, 'users', currentUser.uid), {
        currentStatus: 'busy',
        busyStartTime: serverTimestamp()
      }).catch(e => console.log('[v0] Error updating busy status:', e.message));
    }
  }

  function startTimer(){
    callSeconds = 0;
    timerInterval = setInterval(() => {
      callSeconds++;
      const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
      const s = String(callSeconds%60).padStart(2,'0');
      callTimerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  // ====================================================
  // كتابة رسالة سجل المكالمة في الشات + سجل المكالمات العام
  // ====================================================
  async function logCallToChat(callStatus){
    if(callLogWritten || !currentUser) return;
    callLogWritten = true;

    const lastMessageLabel = callStatus === 'missed'
      ? '📵 مكالمة فائتة'
      : callStatus === 'rejected'
        ? '📵 مكالمة مرفوضة'
        : (isVideo ? '📹 مكالمة فيديو' : '📞 مكالمة صوتية');

    // تحديد مين المتصل ومين المستقبل بغض النظر مين اللي بيكتب اللوج
    const callerUid  = role === 'caller' ? currentUser.uid : peerUid;
    const calleeUid  = role === 'caller' ? peerUid : currentUser.uid;
    const callerName = role === 'caller' ? myDisplayName : peerName;
    const calleeName = role === 'caller' ? peerName : myDisplayName;

    try{
      await setDoc(doc(db, 'chats', chatId), {
        members: [currentUser.uid, peerUid],
        updatedAt: serverTimestamp(),
        lastMessage: lastMessageLabel
      }, { merge: true });

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        type: 'call',
        callStatus: callStatus,
        isVideo: isVideo,
        duration: callSeconds,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch(e){}

    // كتابة السجل في كولكشن callsHistory عشان يظهر في تاب "المكالمات"
    // عند كل من المتصل والمستقبل (الاستعلام هناك بيفلتر على الاتنين)
    try{
      await addDoc(collection(db, 'callsHistory'), {
        callerUid,
        calleeUid,
        callerName,
        calleeName,
        status: callStatus,
        duration: callSeconds,
        createdAt: serverTimestamp()
      });
    } catch(e){
      console.log('[v0] Error writing callsHistory:', e.message);
    }
  }

  // ====================================================
  // إنهاء المكالمة
  // ====================================================
  async function endCall(reason){
    if(callEnded) return;
    callEnded = true;
    clearTimeout(disconnectWatchdog);
    const status = reason === 'no_answer' ? 'missed' : (wasConnected ? 'ended' : 'missed');
    logCallToChat(status);
    try{
      await updateDoc(callDocRef, { status: 'ended' }).catch(()=>{});
    } finally {
      if(currentUser && currentUser.uid){
        updateDoc(doc(db, 'users', currentUser.uid), {
          currentStatus: 'active'
        }).catch(e => console.log('[v0] Error updating user status:', e.message));
      }
      
      const msg = reason === 'no_answer' ? 'لا يوجد رد' :
                  reason === 'user_hangup' ? 'تم إنهاء المكالمة' :
                  wasConnected ? 'انقطع الاتصال' : 'تعذر الاتصال';
      finishCall(msg);
    }
  }

  function finishCall(message){
    callEnded = true;
    callStateEl.textContent = message;
    callTimerEl.classList.remove('show');
    clearInterval(timerInterval);
    setTimeout(cleanupAndClose, 1500);
  }

  function cleanupAndClose(){
    clearTimeout(disconnectWatchdog);
    try{ unsubCallDoc && unsubCallDoc(); }catch(e){}
    try{ unsubCandidates && unsubCandidates(); }catch(e){}
    try{ localStream && localStream.getTracks().forEach(t => t.stop()); }catch(e){}
    try{ if(remoteAudio){ remoteAudio.srcObject = null; remoteAudio.pause(); } }catch(e){}
    try{ if(remoteVideo){ remoteVideo.srcObject = null; remoteVideo.pause(); } }catch(e){}
    try{ pc && pc.close(); }catch(e){}
    deleteDoc(callDocRef).catch(()=>{});
    window.location.href = `room.html?chatId=${encodeURIComponent(chatId)}&uid=${encodeURIComponent(peerUid)}&name=${encodeURIComponent(peerName)}`;
  }

  endBtn.addEventListener('click', () => endCall('user_hangup'));

  muteBtn.addEventListener('click', () => {
    if(!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    muteBtn.classList.toggle('active', isMuted);
    muteBtn.textContent = isMuted ? '🔇' : '🎤';
  });

  // ====================================================
  // تبديل مكبر الصوت (Speaker)
  // الوضع الافتراضي: سماعة المكالمات العلوية (earpiece) بدل مكبر الصوت السفلي
  // ====================================================
  let speakerOn = false; // false = سماعة المكالمات (فوق), true = مكبر الصوت (تحت)

  // كلمات بحث عن الأجهزة بأكتر من لغة/تسمية، عشان أسماء الأجهزة بتختلف حسب الموبايل
  const SPEAKER_WORDS = /speaker(?!.?phone.?off)|loud|external|بلوتوث|مكبر/i;
  const EARPIECE_WORDS = /earpiece|receiver|handset|headphone(?!.?jack)|سماعة الأذن|سماعة الهاتف|سماعة الاستقبال/i;

  function getActiveMediaElements(){
    // في مكالمة الفيديو الصوت بيتشغل من عنصر الفيديو نفسه
    return isVideo ? [remoteVideo] : [remoteAudio];
  }

  async function applyAudioRoute(useSpeakerphone){
    const elements = getActiveMediaElements();

    for(const el of elements){
      if(!el || typeof el.setSinkId !== 'function') continue;
      try{
        const devices = await navigator.mediaDevices.enumerateDevices();
        const outputs = devices.filter(d => d.kind === 'audiooutput');

        const speakerDevice = outputs.find(d => SPEAKER_WORDS.test(d.label));
        const earpieceDevice = outputs.find(d => EARPIECE_WORDS.test(d.label));

        if(useSpeakerphone && speakerDevice){
          await el.setSinkId(speakerDevice.deviceId);
        } else if(!useSpeakerphone && earpieceDevice){
          await el.setSinkId(earpieceDevice.deviceId);
        } else if(!useSpeakerphone){
          // مفيش جهاز باسم واضح لسماعة الأذن، فارجع للـ default
          // اللي بيكون غالبًا هو سماعة المكالمات العلوية على أغلب الموبايلات
          await el.setSinkId('default');
        } else {
          // طلب مكبر صوت لكن مفيش جهاز باسم واضح، خليه على الافتراضي
          await el.setSinkId('default');
        }
      } catch(e){
        console.log('[v0] setSinkId failed, falling back to volume:', e.message);
        el.volume = useSpeakerphone ? 1.0 : 0.6;
      }
    }
  }

  // نطبق سماعة المكالمات (earpiece) كوضع افتراضي بمجرد ما الصوت يوصل،
  // عشان المتصفح مبيبدأش على مكبر الصوت العالي من غير ما اليوزر يطلبه
  function applyDefaultAudioRoute(){
    applyAudioRoute(speakerOn).catch(()=>{});
  }

  speakerBtn.addEventListener('click', async () => {
    speakerOn = !speakerOn;
    speakerBtn.classList.toggle('active', speakerOn);
    speakerBtn.title = speakerOn ? 'إيقاف مكبر الصوت' : 'تشغيل مكبر الصوت';
    await applyAudioRoute(speakerOn);
  });

  // ====================================================
  // مجموعة المكالمات - إضافة أصدقاء وبدء مكالمة جماعية
  // ====================================================
  const groupCallModal = document.getElementById('groupCallModal');
  const friendsList = document.getElementById('friendsList');
  const cancelGroupBtn = document.getElementById('cancelGroupBtn');
  const startGroupBtn = document.getElementById('startGroupBtn');
  let selectedFriends = new Set();

  inviteBtn.addEventListener('click', async () => {
    selectedFriends.clear();
    startGroupBtn.disabled = true;
    friendsList.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">جاري التحميل...</p>';
    groupCallModal.classList.add('show');

    try{
      const usersCollection = await getDocs(collection(db, 'users'));
      const availableUsers = [];
      
      usersCollection.forEach(doc => {
        const userData = doc.data();
        if(doc.id !== currentUser.uid && !userData.blockedUsers?.includes(currentUser.uid)){
          availableUsers.push({
            uid: doc.id,
            name: userData.name || userData.displayName || userData.email || 'مستخدم',
            email: userData.email || '',
            isOnline: userData.isOnline || false,
            photoURL: userData.photoURL || null
          });
        }
      });
      
      if(availableUsers.length === 0){
        console.log('[v0] No available accounts');
        friendsList.innerHTML = '<p style="text-align:center; color:var(--muted);">لا توجد حسابات متاحة</p>';
      } else {
        friendsList.innerHTML = '';
        availableUsers.sort((a, b) => (b.isOnline ? 1 : 0) - (a.isOnline ? 1 : 0));
        
        for(const user of availableUsers){
          const friendItem = document.createElement('div');
          friendItem.className = 'friend-item';
          const onlineIndicator = user.isOnline ? '🟢' : '⚪';
          const avatarHtml = user.photoURL
            ? `<img src="${user.photoURL}" alt="${user.name}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;">`
            : `<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#06121C;flex-shrink:0;">${user.name.charAt(0).toUpperCase()}</div>`;
          friendItem.innerHTML = `
            ${avatarHtml}
            <div class="friend-info" style="flex:1;">
              <div class="friend-name">${onlineIndicator} ${user.name}</div>
              <div class="friend-email">${user.email || 'بدون بريد'}</div>
            </div>
            <div class="friend-check" style="width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;"></div>
          `;

          friendItem.addEventListener('click', () => {
            const checkEl = friendItem.querySelector('.friend-check');
            const isSelected = friendItem.dataset.selected === '1';
            if(isSelected){
              friendItem.dataset.selected = '0';
              friendItem.style.borderColor = '';
              friendItem.style.background = '';
              checkEl.style.background = '';
              checkEl.style.borderColor = 'rgba(255,255,255,.3)';
              checkEl.innerHTML = '';
              selectedFriends.delete(user.uid);
            } else {
              friendItem.dataset.selected = '1';
              friendItem.style.borderColor = 'var(--cyan)';
              friendItem.style.background = 'rgba(47,224,255,.08)';
              checkEl.style.background = 'var(--cyan)';
              checkEl.style.borderColor = 'var(--cyan)';
              checkEl.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#06121C" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
              selectedFriends.add(user.uid);
            }
            startGroupBtn.disabled = selectedFriends.size === 0;
          });

          friendsList.appendChild(friendItem);
        }
      }
    } catch(e){
      console.log('[v0] Error loading available accounts:', e.message);
    }
  });

  cancelGroupBtn.addEventListener('click', () => {
    groupCallModal.classList.remove('show');
    selectedFriends.clear();
    startGroupBtn.disabled = true;
  });

  startGroupBtn.addEventListener('click', async () => {
    if(selectedFriends.size === 0) return;
    startGroupBtn.disabled = true;
    startGroupBtn.textContent = 'جاري الإرسال...';

    try{
      const myName = myDisplayName;

      const invitePromises = Array.from(selectedFriends).map(async (friendUid) => {
        const inviteChatId = [currentUser.uid, friendUid].sort().join('_');
        const inviteRef = doc(db, 'calls', inviteChatId);
        await setDoc(inviteRef, {
          callerUid: currentUser.uid,
          calleeUid: friendUid,
          callerName: myName,
          status: 'ringing',
          offer: (await getDoc(callDocRef)).data()?.offer || {},
          createdAt: serverTimestamp()
        });
      });

      await Promise.allSettled(invitePromises);

      groupCallModal.classList.remove('show');
      selectedFriends.clear();
      startGroupBtn.disabled = true;
      startGroupBtn.textContent = 'بدء المكالمة';
    } catch(e){
      console.log('[v0] Error starting group call:', e.message);
      startGroupBtn.disabled = false;
      startGroupBtn.textContent = 'بدء المكالمة';
    }
  });

  groupCallModal.addEventListener('click', (e) => {
    if(e.target === groupCallModal){
      groupCallModal.classList.remove('show');
      selectedFriends.clear();
      startGroupBtn.disabled = true;
    }
  });

  window.addEventListener('beforeunload', () => {
    if(!callEnded){
      updateDoc(callDocRef, { status: 'ended' }).catch(()=>{});
    }
  });
</script>

</body>
</html>
